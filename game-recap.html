<!DOCTYPE html>
<html lang="en">
<head>
<link rel="manifest" href="/manifest.json">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Recap - Mountainside Aces</title>
<meta name="theme-color" content="#2d5016">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="stylesheet" href="mobile-enhancements.css">
<link rel="stylesheet" href="nav-styles.css">
<link rel="stylesheet" href="dark-mode.css">
<style>
:root {
  --primary-color: #2d5016;
  --secondary-color: #1a6b4a;
  --accent-color: #ffd700;
  --card-bg: #ffffff;
  --text-dark: #2d3748;
  --text-light: #718096;
  --border-color: #e2e8f0;
  --shadow-sm: 0 2px 8px rgba(0,0,0,0.08);
  --shadow-md: 0 4px 16px rgba(0,0,0,0.12);
  --shadow-lg: 0 12px 32px rgba(0,0,0,0.16);
}

* { box-sizing: border-box; }

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  margin: 0;
  padding: 0;
  background: linear-gradient(135deg, #f7fafc 0%, #edf2f7 100%);
  min-height: 100vh;
  color: var(--text-dark);
}

/* ── Header ── */
.header {
  background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
  color: white;
  text-align: center;
  padding: 2.5rem 2rem;
  box-shadow: var(--shadow-lg);
  position: relative;
  overflow: hidden;
}

.header::before {
  content: '';
  position: absolute;
  top: -100px; right: -100px;
  width: 300px; height: 300px;
  background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
  border-radius: 50%;
}

.header h1 {
  margin: 0;
  font-size: 2.4rem;
  font-weight: 800;
  text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
  position: relative;
  z-index: 1;
}

.header p {
  margin: 0.5rem 0 0 0;
  font-size: 1.1rem;
  opacity: 0.95;
  position: relative;
  z-index: 1;
}

.back-btn {
  position: absolute;
  top: 1.25rem;
  left: 1.25rem;
  background: rgba(255,255,255,0.15);
  color: white;
  border: 1px solid rgba(255,255,255,0.35);
  border-radius: 8px;
  padding: 0.4rem 0.85rem;
  font-size: 0.9rem;
  font-weight: 600;
  cursor: pointer;
  z-index: 2;
  transition: background 0.2s;
  text-decoration: none;
}

.back-btn:hover { background: rgba(255,255,255,0.25); }

/* ── Container ── */
.container {
  max-width: 960px;
  margin: 0 auto;
  padding: 2rem;
}

/* ── Scoreboard ── */
.scoreboard {
  background: var(--card-bg);
  border-radius: 16px;
  padding: 2rem 2.5rem;
  margin-bottom: 2rem;
  box-shadow: var(--shadow-sm);
  border: 1px solid var(--border-color);
  position: relative;
  overflow: hidden;
}

.scoreboard::before {
  content: "";
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 5px;
  background: linear-gradient(90deg, var(--primary-color) 0%, var(--secondary-color) 100%);
}

.score-row {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 1.5rem;
  flex-wrap: wrap;
  margin-bottom: 1rem;
}

.score-team {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.5rem;
  flex: 1;
  min-width: 120px;
  max-width: 280px;
}

.score-team-logo {
  width: 72px;
  height: 72px;
  border-radius: 50%;
  object-fit: contain;
  background: white;
  border: 2px solid var(--border-color);
  box-shadow: var(--shadow-sm);
}

.score-team-name {
  font-size: 1.5rem;
  font-weight: 800;
  color: var(--text-dark);
  text-align: center;
}

.score-team-name.winner {
  color: var(--primary-color);
}

.score-number {
  font-size: 3rem;
  font-weight: 900;
  color: var(--text-dark);
  line-height: 1;
}

.score-number.winner {
  color: var(--primary-color);
}

.score-divider {
  font-size: 2rem;
  font-weight: 700;
  color: var(--text-light);
  flex-shrink: 0;
}

.game-meta {
  text-align: center;
  color: var(--text-light);
  font-size: 0.95rem;
  margin-top: 0.5rem;
  font-weight: 500;
}

.game-type-badge {
  display: inline-block;
  background: var(--primary-color);
  color: white;
  font-size: 0.75rem;
  font-weight: 700;
  padding: 0.2rem 0.6rem;
  border-radius: 20px;
  letter-spacing: 0.5px;
  margin-left: 0.4rem;
  vertical-align: middle;
}

/* ── Section card ── */
.section {
  background: var(--card-bg);
  border-radius: 16px;
  margin-bottom: 2rem;
  box-shadow: var(--shadow-sm);
  overflow: hidden;
  border: 1px solid var(--border-color);
}

.section-header {
  background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
  color: white;
  padding: 1.1rem 1.75rem;
  font-size: 1.15rem;
  font-weight: 700;
  display: flex;
  align-items: center;
  gap: 0.6rem;
}

.team-section-header {
  background: #f8f9fa;
  padding: 1rem 1.5rem;
  border-bottom: 2px solid var(--primary-color);
  display: flex;
  align-items: center;
  gap: 0.75rem;
}

.team-section-logo {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  object-fit: contain;
  background: white;
  border: 1px solid var(--border-color);
}

.team-section-name {
  font-size: 1.1rem;
  font-weight: 800;
  color: var(--text-dark);
}

.team-section-label {
  font-size: 0.8rem;
  font-weight: 600;
  color: var(--text-light);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

/* ── Stat tables ── */
.stat-table-wrap {
  padding: 0 1.5rem 1.5rem 1.5rem;
  overflow-x: auto;
}

.stat-table-wrap:first-of-type {
  padding-top: 1.25rem;
}

.subsection-label {
  font-size: 0.8rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.6px;
  color: var(--text-light);
  padding: 1rem 0 0.5rem 0;
  border-top: 1px solid var(--border-color);
  margin-top: 0.25rem;
}

.subsection-label:first-child {
  border-top: none;
  padding-top: 0;
}

.box-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.9rem;
  min-width: 340px;
}

.box-table th {
  padding: 0.55rem 0.7rem;
  text-align: right;
  font-size: 0.75rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text-light);
  background: #f8f9fa;
  border-bottom: 2px solid var(--border-color);
  white-space: nowrap;
}

.box-table th:first-child {
  text-align: left;
}

.box-table td {
  padding: 0.6rem 0.7rem;
  text-align: right;
  border-bottom: 1px solid var(--border-color);
  color: var(--text-dark);
  white-space: nowrap;
}

.box-table td:first-child {
  text-align: left;
  font-weight: 600;
}

.box-table tbody tr:last-child td {
  border-bottom: none;
}

.box-table tbody tr:hover {
  background: #f8f9fa;
}

.box-table .totals-row td {
  font-weight: 700;
  border-top: 2px solid var(--border-color);
  border-bottom: none;
  background: #f8f9fa;
}

.player-link {
  color: var(--primary-color);
  text-decoration: none;
  font-weight: 600;
}

.player-link:hover {
  text-decoration: underline;
}

/* ── No data / Loading ── */
.no-data {
  text-align: center;
  padding: 2rem;
  color: var(--text-light);
  font-style: italic;
}

.loading-state {
  text-align: center;
  padding: 3rem 2rem;
  color: var(--text-light);
}

.spinner {
  font-size: 2.5rem;
  animation: spin 1.5s ease-in-out infinite;
  display: block;
  margin-bottom: 1rem;
}

@keyframes spin {
  0%, 100% { transform: rotate(0deg) scale(1); }
  50% { transform: rotate(180deg) scale(1.1); }
}

/* ── Responsive ── */
@media (max-width: 640px) {
  .header h1 { font-size: 1.75rem; }
  .container { padding: 1rem; }

  .score-team-name { font-size: 1.2rem; }
  .score-number { font-size: 2.25rem; }
  .score-divider { font-size: 1.5rem; }

  .stat-table-wrap { padding: 0 0.75rem 1rem 0.75rem; }
  .box-table { font-size: 0.82rem; min-width: 300px; }
  .box-table th, .box-table td { padding: 0.5rem 0.45rem; }
}

/* ── Dark mode ── */
[data-theme="dark"] .scoreboard,
[data-theme="dark"] .section {
  background: var(--card-bg);
  border-color: var(--border-color);
}
[data-theme="dark"] .team-section-header {
  background: var(--bg-elevated);
}
[data-theme="dark"] .box-table th {
  background: var(--table-header-bg);
  color: var(--text-dark);
}
[data-theme="dark"] .box-table tbody tr:hover {
  background: var(--table-row-hover);
}
[data-theme="dark"] .box-table .totals-row td {
  background: var(--bg-elevated);
}
[data-theme="dark"] .score-team-logo {
  background: var(--bg-elevated);
  border-color: var(--border-color);
}
</style>
</head>
<body>

<header class="header">
  <a class="back-btn" href="current-season.html">&#8592; Back</a>
  <h1>⚾ Game Recap</h1>
  <p id="gameSubtitle">Loading...</p>
</header>

<div class="container">
  <div id="mainContent" class="loading-state">
    <span class="spinner">⚾</span>
    <p>Loading game recap...</p>
  </div>
</div>

<script type="module">
  import {
    db,
    doc,
    getDoc
  } from './firebase-data.js';
  import {
    collection,
    collectionGroup,
    getDocs,
    query,
    where
  } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

  // ── URL params ──────────────────────────────────────────────────────────────
  const params  = new URLSearchParams(window.location.search);
  const gameId  = params.get('gameId');
  const seasonId = params.get('seasonId');

  if (!gameId || !seasonId) {
    showError('Missing gameId or seasonId URL parameters.');
  } else {
    loadRecap();
  }

  // ── Main loader ─────────────────────────────────────────────────────────────
  async function loadRecap() {
    try {
      // 1. Fetch game document
      const gameRef = doc(db, 'seasons', seasonId, 'games', gameId);
      const gameSnap = await getDoc(gameRef);

      if (!gameSnap.exists()) {
        showError(`Game not found: seasons/${seasonId}/games/${gameId}`);
        return;
      }

      const game = { id: gameSnap.id, ...gameSnap.data() };
      const gameDocId = `${seasonId}_${gameId}`;

      // ── Resolve team names ────────────────────────────────────────────────
      const capitalize = s => s ? s.charAt(0).toUpperCase() + s.slice(1) : '';
      const homeTeam = game.homeTeam || game.homeTeamName || capitalize(game.homeTeamId) || 'Home';
      const awayTeam = game.awayTeam || game.awayTeamName || capitalize(game.awayTeamId) || 'Away';
      const homeScore = game.homeScore ?? null;
      const awayScore = game.awayScore ?? null;
      const winner    = capitalize(game.winner || '');
      const gameType  = game.game_type || game.gameType || 'Regular';

      // ── Format date ───────────────────────────────────────────────────────
      let dateStr = '';
      if (game.date && game.date.seconds) {
        dateStr = new Date(game.date.seconds * 1000).toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
      } else if (game.date && typeof game.date.toDate === 'function') {
        dateStr = game.date.toDate().toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
      } else if (game.date) {
        dateStr = game.date;
      }

      // ── Update page header ────────────────────────────────────────────────
      const scoreText = (homeScore !== null && awayScore !== null)
        ? `${homeTeam} ${homeScore}, ${awayTeam} ${awayScore}`
        : `${homeTeam} vs ${awayTeam}`;
      document.getElementById('gameSubtitle').textContent = scoreText + (dateStr ? ` · ${dateStr}` : '');
      document.title = `${scoreText} - Game Recap`;

      // 2. Fetch all batting stats for this game via collectionGroup
      const [battingDocs, pitchingDocs] = await Promise.all([
        fetchCollectionGroup('playerStats', gameDocId),
        fetchCollectionGroup('pitchingStats', gameDocId)
      ]);

      // ── Render ────────────────────────────────────────────────────────────
      renderPage({
        homeTeam, awayTeam, homeScore, awayScore, winner,
        gameType, dateStr, gameDocId,
        battingDocs, pitchingDocs
      });

    } catch (err) {
      console.error('Recap load error:', err);
      showError('Error loading game recap. Please try again.');
    }
  }

  // ── Fetch collectionGroup('games') filtered by gameDocId field ─────────────
  async function fetchCollectionGroup(parentCollection, gameDocId) {
    try {
      const q = query(
        collectionGroup(db, 'games'),
        where('gameDocId', '==', gameDocId)
      );
      const snap = await getDocs(q);
      // Filter to only docs from the right parent collection
      return snap.docs
        .filter(d => {
          const path = d.ref.path; // e.g. playerStats/john_doe/games/2026-summer_...
          return path.startsWith(parentCollection + '/');
        })
        .map(d => ({ id: d.id, _path: d.ref.path, ...d.data() }));
    } catch (err) {
      console.warn(`collectionGroup query failed for ${parentCollection}:`, err);
      return [];
    }
  }

  // ── Render page ─────────────────────────────────────────────────────────────
  function renderPage({ homeTeam, awayTeam, homeScore, awayScore, winner, gameType, dateStr, battingDocs, pitchingDocs }) {
    const container = document.getElementById('mainContent');
    container.className = '';
    container.innerHTML = '';

    // ── Scoreboard ───────────────────────────────────────────────────────────
    const homeWon = winner === homeTeam;
    const awayWon = winner === awayTeam;
    const gameTypeBadge = (gameType === 'Playoff' || gameType === 'playoff')
      ? '<span class="game-type-badge">PLAYOFF</span>' : '';

    container.innerHTML += `
      <div class="scoreboard">
        <div class="score-row">
          <div class="score-team">
            <img class="score-team-logo"
                 src="logos/${awayTeam.toLowerCase()}.png"
                 alt="${awayTeam} logo"
                 onerror="this.style.display='none'">
            <div class="score-team-name ${awayWon ? 'winner' : ''}">${awayTeam}</div>
            <div class="score-number ${awayWon ? 'winner' : ''}">${awayScore ?? '—'}</div>
            ${awayWon ? '<div style="font-size:0.85rem;font-weight:700;color:var(--primary-color);">WINNER ✓</div>' : ''}
          </div>

          <div class="score-divider">·</div>

          <div class="score-team">
            <img class="score-team-logo"
                 src="logos/${homeTeam.toLowerCase()}.png"
                 alt="${homeTeam} logo"
                 onerror="this.style.display='none'">
            <div class="score-team-name ${homeWon ? 'winner' : ''}">${homeTeam}</div>
            <div class="score-number ${homeWon ? 'winner' : ''}">${homeScore ?? '—'}</div>
            ${homeWon ? '<div style="font-size:0.85rem;font-weight:700;color:var(--primary-color);">WINNER ✓</div>' : ''}
          </div>
        </div>
        <div class="game-meta">${dateStr || ''}${gameTypeBadge}</div>
      </div>
    `;

    // ── Box scores — one section per team ────────────────────────────────────
    const teams = [
      { name: homeTeam, label: 'Home' },
      { name: awayTeam, label: 'Away' }
    ];

    teams.forEach(({ name: team, label }) => {
      const teamBatting  = battingDocs.filter(d => matchesTeam(d, team));
      const teamPitching = pitchingDocs.filter(d => matchesTeam(d, team));

      if (teamBatting.length === 0 && teamPitching.length === 0) return;

      const sectionEl = document.createElement('div');
      sectionEl.className = 'section';

      // Section header (gradient bar)
      const isWinner = winner === team;
      sectionEl.innerHTML = `
        <div class="section-header">
          <span>⚾</span>
          <span>${team}</span>
          <span style="opacity:0.7;font-size:0.85rem;font-weight:500;">(${label})</span>
          ${isWinner ? '<span style="margin-left:auto;font-size:0.85rem;">🏆 Winner</span>' : ''}
        </div>
      `;

      // Team sub-header with logo
      const teamHeaderEl = document.createElement('div');
      teamHeaderEl.className = 'team-section-header';
      teamHeaderEl.innerHTML = `
        <img class="team-section-logo"
             src="logos/${team.toLowerCase()}.png"
             alt="${team}"
             onerror="this.style.display='none'">
        <div>
          <div class="team-section-name">${team}</div>
          <div class="team-section-label">${label} Team</div>
        </div>
      `;
      sectionEl.appendChild(teamHeaderEl);

      // Batting table
      if (teamBatting.length > 0) {
        teamBatting.sort((a, b) => (b.atBats || 0) - (a.atBats || 0));

        const totAB = sum(teamBatting, 'atBats');
        const totH  = sum(teamBatting, 'hits');
        const totR  = sum(teamBatting, 'runs');
        const totBB = sum(teamBatting, 'walks');
        const tot2B = sum(teamBatting, 'doubles');
        const tot3B = sum(teamBatting, 'triples');
        const totHR = sum(teamBatting, 'homeRuns');

        const wrapEl = document.createElement('div');
        wrapEl.className = 'stat-table-wrap';
        wrapEl.innerHTML = `
          <div class="subsection-label">Batting</div>
          <table class="box-table">
            <thead>
              <tr>
                <th>Player</th>
                <th>AB</th>
                <th>H</th>
                <th>R</th>
                <th>BB</th>
                <th>2B</th>
                <th>3B</th>
                <th>HR</th>
                <th>AVG</th>
              </tr>
            </thead>
            <tbody>
              ${teamBatting.map(p => {
                const avg = (p.atBats || 0) > 0
                  ? (p.hits / p.atBats).toFixed(3).replace(/^0/, '')
                  : '---';
                const playerLegacyId = extractLegacyId(p._path, 'playerStats');
                const nameLink = playerLegacyId
                  ? `<a class="player-link" href="player.html?id=${encodeURIComponent(playerLegacyId)}">${esc(p.playerName || p.playerId || '?')}</a>`
                  : esc(p.playerName || p.playerId || '?');
                return `<tr>
                  <td>${nameLink}</td>
                  <td>${p.atBats ?? 0}</td>
                  <td>${p.hits ?? 0}</td>
                  <td>${p.runs ?? 0}</td>
                  <td>${p.walks ?? 0}</td>
                  <td>${p.doubles ?? 0}</td>
                  <td>${p.triples ?? 0}</td>
                  <td>${p.homeRuns ?? 0}</td>
                  <td>${avg}</td>
                </tr>`;
              }).join('')}
            </tbody>
            <tfoot>
              <tr class="totals-row">
                <td>Totals</td>
                <td>${totAB}</td>
                <td>${totH}</td>
                <td>${totR}</td>
                <td>${totBB}</td>
                <td>${tot2B}</td>
                <td>${tot3B}</td>
                <td>${totHR}</td>
                <td>${totAB > 0 ? (totH/totAB).toFixed(3).replace(/^0/,'') : '---'}</td>
              </tr>
            </tfoot>
          </table>
        `;
        sectionEl.appendChild(wrapEl);
      }

      // Pitching table
      if (teamPitching.length > 0) {
        teamPitching.sort((a, b) => (b.inningsPitched || 0) - (a.inningsPitched || 0));

        const totIP = sumFloat(teamPitching, 'inningsPitched');
        const totRA = sum(teamPitching, 'runsAllowed');

        const wrapEl = document.createElement('div');
        wrapEl.className = 'stat-table-wrap';
        wrapEl.innerHTML = `
          <div class="subsection-label">Pitching</div>
          <table class="box-table">
            <thead>
              <tr>
                <th>Pitcher</th>
                <th>IP</th>
                <th>R</th>
              </tr>
            </thead>
            <tbody>
              ${teamPitching.map(p => {
                const playerLegacyId = extractLegacyId(p._path, 'pitchingStats');
                const nameLink = playerLegacyId
                  ? `<a class="player-link" href="player.html?id=${encodeURIComponent(playerLegacyId)}">${esc(p.playerName || p.playerId || '?')}</a>`
                  : esc(p.playerName || p.playerId || '?');
                return `<tr>
                  <td>${nameLink}</td>
                  <td>${formatIP(p.inningsPitched)}</td>
                  <td>${p.runsAllowed ?? 0}</td>
                </tr>`;
              }).join('')}
            </tbody>
            <tfoot>
              <tr class="totals-row">
                <td>Totals</td>
                <td>${formatIP(totIP)}</td>
                <td>${totRA}</td>
              </tr>
            </tfoot>
          </table>
        `;
        sectionEl.appendChild(wrapEl);
      }

      container.appendChild(sectionEl);
    });

    // If NO stats at all
    const sections = container.querySelectorAll('.section');
    if (sections.length === 0) {
      container.innerHTML += `
        <div class="section">
          <div class="no-data">
            <p>No box score stats have been submitted for this game yet.</p>
          </div>
        </div>
      `;
    }
  }

  // ── Helpers ──────────────────────────────────────────────────────────────────

  function matchesTeam(doc, teamName) {
    const tid = (doc.teamId || '').toLowerCase().trim();
    const tname = teamName.toLowerCase().trim();
    return tid === tname;
  }

  function extractLegacyId(path, collection) {
    // path = "playerStats/john_doe/games/2026-summer_..."
    const prefix = collection + '/';
    if (!path.startsWith(prefix)) return null;
    const rest = path.slice(prefix.length);
    const slash = rest.indexOf('/');
    return slash >= 0 ? rest.slice(0, slash) : rest;
  }

  function sum(arr, field) {
    return arr.reduce((s, d) => s + (Number(d[field]) || 0), 0);
  }

  function sumFloat(arr, field) {
    return arr.reduce((s, d) => s + (parseFloat(d[field]) || 0), 0);
  }

  function formatIP(val) {
    const n = parseFloat(val) || 0;
    return n % 1 === 0 ? n.toFixed(0) : n.toFixed(1);
  }

  function esc(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function showError(msg) {
    const container = document.getElementById('mainContent');
    container.className = '';
    container.innerHTML = `
      <div class="section">
        <div class="no-data">
          <p>${esc(msg)}</p>
          <p><a href="current-season.html" style="color:var(--primary-color);">← Return to current season</a></p>
        </div>
      </div>
    `;
  }
</script>
