<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aceys Award Voting 🏆</title>
  <link rel="stylesheet" href="nav-styles.css">
  <style>
    :root {
      --gold: #c9a227;
      --gold-light: #f0d060;
      --gold-glow: rgba(201,162,39,0.3);
      --dark: #0d0b08;
      --dark2: #161310;
      --dark3: #201c16;
      --border: #3a342c;
      --text: #f0e8d8;
      --text-dim: #9a8c7a;
      --green: #166534;
      --green-bg: #dcfce7;
      --radius: 10px;
    }
    * { box-sizing: border-box; }
    body { font-family: 'Inter', -apple-system, sans-serif; margin: 0; padding: 0; background: var(--dark); color: var(--text); min-height: 100vh; }

    /* Hero */
    .hero { text-align: center; padding: 2.5rem 1.5rem 1.5rem; background: radial-gradient(ellipse at 50% 0%, rgba(201,162,39,0.1) 0%, transparent 65%); border-bottom: 1px solid var(--border); }
    .hero h1 { font-size: 1.75rem; color: var(--gold); margin: 0 0 0.25rem; }
    .hero p { color: var(--text-dim); font-size: 0.9rem; margin: 0; }
    .hero-divider { width: 50px; height: 2px; background: linear-gradient(to right, transparent, var(--gold), transparent); margin: 1rem auto 0; }

    /* Auth gate */
    .auth-gate { display: flex; align-items: center; justify-content: center; min-height: 60vh; }
    .auth-gate-inner { text-align: center; background: var(--dark2); border: 1px solid var(--border); border-radius: 12px; padding: 2.5rem; max-width: 380px; }
    .auth-gate-inner h2 { color: var(--gold); margin: 0 0 0.5rem; }
    .auth-gate-inner p { color: var(--text-dim); font-size: 0.9rem; margin: 0 0 1.25rem; }

    /* Layout */
    .container { max-width: 680px; margin: 0 auto; padding: 1.5rem 1rem 4rem; }

    /* Section header */
    .section-title { font-size: 0.75rem; color: var(--gold); text-transform: uppercase; letter-spacing: 0.12em; font-weight: 700; margin: 2rem 0 0.75rem; padding-bottom: 0.5rem; border-bottom: 1px solid var(--border); }

    /* Award vote card */
    .vote-card { background: var(--dark2); border: 1px solid var(--border); border-radius: 12px; padding: 1.25rem; margin-bottom: 0.875rem; transition: border-color 0.3s; }
    .vote-card.voted { border-color: var(--gold); }
    .vote-card-header { display: flex; align-items: center; gap: 0.875rem; margin-bottom: 0.875rem; }
    .award-img { width: 2.5rem; height: 2.5rem; object-fit: contain; filter: drop-shadow(0 0 6px rgba(201,162,39,0.3)); flex-shrink: 0; }
    .award-img-fallback { font-size: 1.5rem; width: 2.5rem; text-align: center; flex-shrink: 0; }
    .award-info .award-name { font-weight: 700; font-size: 0.95rem; color: var(--text); }
    .award-info .award-sub { font-size: 0.78rem; color: var(--text-dim); margin-top: 2px; }

    /* Voted state */
    .voted-display { display: flex; align-items: center; justify-content: space-between; background: rgba(201,162,39,0.1); border: 1px solid rgba(201,162,39,0.3); border-radius: 8px; padding: 0.6rem 0.875rem; gap: 0.75rem; }
    .voted-name { font-weight: 700; color: var(--gold-light); font-size: 0.95rem; }
    .voted-label { font-size: 0.72rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.08em; }
    .change-vote-btn { background: none; border: 1px solid var(--border); color: var(--text-dim); border-radius: 6px; padding: 0.3rem 0.65rem; font-size: 0.75rem; cursor: pointer; white-space: nowrap; transition: all 0.2s; }
    .change-vote-btn:hover { border-color: var(--gold); color: var(--gold); }

    /* Player search */
    .search-row { display: flex; gap: 0.5rem; align-items: flex-start; }
    .player-search-wrap { position: relative; flex: 1; }
    .player-search-wrap input { width: 100%; padding: 0.55rem 0.75rem; border: 1px solid var(--border); border-radius: 8px; background: var(--dark3); color: var(--text); font-size: 0.875rem; font-family: inherit; }
    .player-search-wrap input:focus { outline: none; border-color: var(--gold); }
    .player-dropdown { position: absolute; left: 0; right: 0; top: 100%; background: var(--dark3); border: 1px solid var(--gold); border-top: none; border-radius: 0 0 8px 8px; z-index: 200; max-height: 200px; overflow-y: auto; }
    .player-dropdown-item { padding: 0.5rem 0.75rem; cursor: pointer; font-size: 0.85rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 0.5rem; }
    .player-dropdown-item:last-child { border-bottom: none; }
    .player-dropdown-item:hover { background: rgba(201,162,39,0.15); }
    .p-name { font-weight: 600; color: var(--text); }
    .p-team { font-size: 0.73rem; color: var(--text-dim); margin-left: auto; }

    /* Buttons */
    .btn { display: inline-flex; align-items: center; gap: 0.4rem; padding: 0.55rem 1.1rem; border-radius: 8px; border: none; cursor: pointer; font-size: 0.875rem; font-weight: 700; transition: all 0.2s; white-space: nowrap; }
    .btn-gold { background: var(--gold); color: #12100e; }
    .btn-gold:hover:not(:disabled) { background: var(--gold-light); }
    .btn-gold:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-secondary { background: var(--dark3); color: var(--text); border: 1px solid var(--border); }
    .btn-secondary:hover { border-color: var(--gold); color: var(--gold); }

    /* Progress summary */
    .progress-bar-wrap { background: var(--dark2); border: 1px solid var(--border); border-radius: 10px; padding: 1rem 1.25rem; margin-bottom: 1.5rem; display: flex; align-items: center; gap: 1.25rem; }
    .progress-count { font-size: 1.5rem; font-weight: 700; color: var(--gold); }
    .progress-label { font-size: 0.8rem; color: var(--text-dim); }
    .progress-track { flex: 1; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
    .progress-fill { height: 100%; background: linear-gradient(to right, var(--gold), var(--gold-light)); border-radius: 3px; transition: width 0.5s ease; }

    /* Submit all button */
    .submit-section { text-align: center; margin-top: 2rem; }
    .submit-section p { color: var(--text-dim); font-size: 0.8rem; margin-top: 0.75rem; }

    /* Toast */
    .toast { position: fixed; bottom: 2rem; right: 2rem; background: var(--gold); color: #12100e; padding: 0.85rem 1.25rem; border-radius: 10px; box-shadow: 0 4px 16px rgba(0,0,0,0.4); font-weight: 700; z-index: 9999; animation: slideIn 0.3s ease; max-width: 280px; }
    .toast.error { background: #991b1b; color: white; }
    .toast.success { background: #166534; color: white; }
    @keyframes slideIn { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

    .hidden { display: none !important; }
    .loading-msg { text-align: center; color: var(--text-dim); padding: 3rem 1rem; font-size: 0.9rem; }

    /* Multi-winner textarea */
    .multi-hint { font-size: 0.75rem; color: var(--text-dim); margin-top: 0.35rem; }
    textarea.multi-input { width: 100%; padding: 0.55rem 0.75rem; border: 1px solid var(--border); border-radius: 8px; background: var(--dark3); color: var(--text); font-size: 0.875rem; font-family: inherit; resize: vertical; min-height: 80px; }
    textarea.multi-input:focus { outline: none; border-color: var(--gold); }
  </style>
</head>
<body>

<div id="authGate" class="auth-gate hidden">
  <div class="auth-gate-inner">
    <div style="font-size:2.5rem;margin-bottom:0.5rem;">🗳️</div>
    <h2>Sign In to Vote</h2>
    <p>You need to be signed in to cast your Aceys Award votes.</p>
    <a href="signin.html?redirect=aceys-award-voting.html" class="btn btn-gold">Sign In</a>
  </div>
</div>

<div id="mainContent" class="hidden">
  <div class="hero">
    <h1>🏆 Aceys Award Voting</h1>
    <p>Cast your vote for each award — one vote per member, per category</p>
    <div class="hero-divider"></div>
  </div>

  <div class="container">
    <div id="loadingMsg" class="loading-msg">Loading awards…</div>

    <div id="votingContent" class="hidden">

      <!-- Progress -->
      <div class="progress-bar-wrap">
        <div>
          <div class="progress-count"><span id="votedCount">0</span> / <span id="totalCount">0</span></div>
          <div class="progress-label">awards voted</div>
        </div>
        <div class="progress-track">
          <div class="progress-fill" id="progressFill" style="width:0%"></div>
        </div>
      </div>

      <!-- Individual awards -->
      <div id="individualSection"></div>

      <!-- Team MVPs -->
      <div id="teamSection"></div>

      <!-- All Aces / Gold Gloves -->
      <div id="multiSection"></div>

      <!-- Write-in / special -->
      <div id="writeInSection"></div>

      <div class="submit-section">
        <button class="btn btn-gold" id="submitAllBtn" onclick="submitAllVotes()" style="font-size:1rem;padding:0.75rem 2rem;">
          ✅ Submit All Votes
        </button>
        <p>You can change your votes at any time before the ceremony.</p>
      </div>

    </div>
  </div>
</div>

<script type="module">
import { auth } from './firebase-auth.js';
import { db } from './firebase-config.js';
import { onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
import {
  collection, doc, getDoc, getDocs, setDoc, onSnapshot, serverTimestamp
} from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

// ── Award definitions (must match admin-aceys.html) ───────────────────────────
const INDIVIDUAL_AWARDS = [
  { id: '2026_mvp',           label: 'MVP',                          img: 'awards/mvp.png',                              multi: false },
  { id: '2026_pitcher',       label: 'Pitcher of the Year',          img: 'awards/pitcher_of_the_year.png',              multi: false },
  { id: '2026_rookie',        label: 'Rookie of the Year',           img: 'awards/rookie_of_the_year.png',               multi: false },
  { id: '2026_comeback',      label: 'Comeback Player of the Year',  img: 'awards/comeback_player_of_the_year.png',      multi: false },
  { id: '2026_slugger',       label: 'Slugger of the Year',          img: 'awards/slugger_of_the_year.png',              multi: false },
  { id: '2026_most-improved', label: 'Most Improved Ace',            img: 'awards/most_improved_ace.png',                multi: false },
  { id: '2026_iron-man',      label: 'Iron Man Award',               img: 'awards/iron_man_award.png',                   multi: false },
  { id: '2026_captain',       label: 'Captain of the Year',          img: 'awards/captain_of_the_year.png',              multi: false },
  { id: '2026_sub',           label: 'Sub of the Year',              img: 'awards/sub_of_the_year.png',                  multi: false },
  { id: '2026_good-guy',      label: 'Al Pineda Good Guy Award',     img: 'awards/al_pineda_good_guy_award.png',         multi: false },
  { id: '2026_lund',          label: 'Erik Lund Perseverance Award', img: 'awards/erik_lund_perservenance_award.png',    multi: false },
  { id: '2026_streaman',      label: 'Mr. Streaman Award',           img: 'awards/mr_streaman_award_for_excellence.png', multi: false },
];

const MULTI_AWARDS = [
  { id: '2026_all-aces',   label: 'All Aces Team',   img: 'awards/all_aces.png',   multi: true },
  { id: '2026_gold-glove', label: 'Gold Glove Team', img: 'awards/gold_glove.png', multi: true },
];

// ── State ─────────────────────────────────────────────────────────────────────
let currentUser = null;
let awardsActivity = {};   // aceyAwards docs — for active/inactive check
let userVotes = {};        // { awardId: { playerName, playerId, legacyId, votedAt } }
let pendingVotes = {};     // unsaved selections in this session
let allPlayers = [];
let TEAMS = [];

// Track which search field is open
let activeDropdownId = null;

// ── Auth ──────────────────────────────────────────────────────────────────────
onAuthStateChanged(auth, async user => {
  if (!user) { showGate(); return; }
  currentUser = user;
  document.getElementById('mainContent').classList.remove('hidden');
  await init();
});

function showGate() {
  document.getElementById('authGate').classList.remove('hidden');
}

// ── Init ──────────────────────────────────────────────────────────────────────
async function init() {
  await Promise.all([loadPlayers(), loadTeams()]);

  // Load user's existing votes
  try {
    const voteSnap = await getDoc(doc(db, 'aceyVotes', currentUser.uid));
    if (voteSnap.exists()) userVotes = voteSnap.data().votes || {};
  } catch(e) { userVotes = {}; }

  // Listen to aceyAwards for active/inactive changes
  onSnapshot(collection(db, 'aceyAwards'), snap => {
    awardsActivity = {};
    snap.docs.forEach(d => { awardsActivity[d.id] = d.data(); });
    renderAll();
    document.getElementById('loadingMsg').classList.add('hidden');
    document.getElementById('votingContent').classList.remove('hidden');
  }, err => {
    document.getElementById('loadingMsg').textContent = 'Could not load awards. Please refresh.';
  });
}

// ── Player loading ────────────────────────────────────────────────────────────
async function loadPlayers() {
  try {
    const snap = await getDocs(collection(db, 'users'));
    const raw = snap.docs.map(d => ({
      id: d.id,
      displayName: d.data().displayName || d.data().name || idToName(d.id),
      currentTeam: d.data().currentTeam || d.data().linkedTeam || '',
      legacyId: d.data().legacyId || null,
      migrated: d.data().migrated || false,
    })).filter(p => !p.migrated && p.id && !p.id.startsWith('anon'));

    // Deduplicate: prefer longer UID (Firebase auth > legacy snake_case)
    const byName = new Map();
    raw.forEach(p => {
      const key = p.displayName.toLowerCase();
      const existing = byName.get(key);
      if (!existing || p.id.length > existing.id.length) byName.set(key, p);
    });
    allPlayers = Array.from(byName.values()).sort((a, b) => a.displayName.localeCompare(b.displayName));
  } catch(e) { console.error('loadPlayers error', e); }
}

async function loadTeams() {
  try {
    const snap = await getDocs(collection(db, 'teams'));
    TEAMS = snap.docs
      .map(d => ({ id: d.id, name: d.data().teamName || d.data().name || d.id }))
      .filter(t => !['kings', 'white'].includes(t.name.toLowerCase()))
      .sort((a, b) => a.name.localeCompare(b.name));
  } catch(e) { TEAMS = []; }
}

function idToName(id) {
  return id.split('_').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
}

// ── Render ────────────────────────────────────────────────────────────────────
function renderAll() {
  const activeIndividual = INDIVIDUAL_AWARDS.filter(a => awardsActivity[a.id]?.active !== false);
  const activeMulti      = MULTI_AWARDS.filter(a => awardsActivity[a.id]?.active !== false);
  const activeTeams      = TEAMS.filter(t => awardsActivity[`2026_team-mvp_${t.id}`]?.active !== false);
  const writeIns         = Object.entries(awardsActivity)
    .filter(([, d]) => d.source === 'write-in' && d.active !== false)
    .map(([id, d]) => ({ id, label: d.label || id, multi: d.multi || false, icon: '🏆' }));

  renderSection('individualSection', '🏅 Individual Awards', activeIndividual);
  renderSection('teamSection', '🦁 Team MVPs',
    activeTeams.map(t => ({ id: `2026_team-mvp_${t.id}`, label: `${t.name} MVP`, img: 'awards/team_mvp.png', multi: false, sub: t.name }))
  );
  renderSection('multiSection', '⭐ All-League Teams', activeMulti);
  if (writeIns.length) {
    renderSection('writeInSection', '✍️ Special Awards', writeIns);
  } else {
    document.getElementById('writeInSection').innerHTML = '';
  }

  updateProgress();
}

function renderSection(containerId, title, awards) {
  const el = document.getElementById(containerId);
  if (!el) return;
  if (!awards.length) { el.innerHTML = ''; return; }
  el.innerHTML = `<div class="section-title">${title}</div>` +
    awards.map(a => voteCardHtml(a)).join('');
}

function voteCardHtml(a) {
  const voted     = userVotes[a.id];
  const pending   = pendingVotes[a.id];
  const current   = pending || voted; // pending overrides saved
  const isVoted   = !!voted && !pending?.cleared;
  const hasPending = !!pending && !pending.cleared;

  const imgHtml = a.img
    ? `<img class="award-img" src="${a.img}" alt="${a.label}">`
    : `<div class="award-img-fallback">${a.icon || '🏆'}</div>`;

  let inputHtml;
  if (a.multi) {
    const existingNames = (current?.playerNames || []).join('\n');
    inputHtml = `
      <textarea class="multi-input" id="input-${a.id}" placeholder="One player per line…">${existingNames}</textarea>
      <div class="multi-hint">Enter one player name per line</div>`;
  } else {
    inputHtml = `
      <div class="search-row">
        <div class="player-search-wrap">
          <input type="text" id="input-${a.id}" placeholder="Search player…" autocomplete="off"
            value="${current?.playerName || ''}"
            oninput="handleSearch(this, '${a.id}')">
          <div class="player-dropdown hidden" id="drop-${a.id}"></div>
        </div>
      </div>`;
  }

  const statusTag = isVoted && !hasPending
    ? `<div class="voted-display">
        <div><div class="voted-label">Your vote</div><div class="voted-name">${voted.playerName || (voted.playerNames || []).join(', ')}</div></div>
        <button class="change-vote-btn" onclick="changeVote('${a.id}')">Change</button>
       </div>`
    : inputHtml;

  const isEditing = !isVoted || hasPending;

  return `
    <div class="vote-card ${isVoted && !hasPending ? 'voted' : ''}" id="card-${a.id}">
      <div class="vote-card-header">
        ${imgHtml}
        <div class="award-info">
          <div class="award-name">${a.label}</div>
          ${a.sub ? `<div class="award-sub">${a.sub}</div>` : ''}
        </div>
      </div>
      <div id="input-wrap-${a.id}">
        ${statusTag}
      </div>
    </div>`;
}

function changeVote(awardId) {
  // Mark as being changed (clearing saved state in display only)
  pendingVotes[awardId] = { cleared: true };
  rerenderCard(awardId);
}

function rerenderCard(awardId) {
  // Find the award definition
  const all = [
    ...INDIVIDUAL_AWARDS,
    ...MULTI_AWARDS,
    ...TEAMS.map(t => ({ id: `2026_team-mvp_${t.id}`, label: `${t.name} MVP`, img: 'awards/team_mvp.png', multi: false, sub: t.name })),
    ...Object.entries(awardsActivity)
      .filter(([, d]) => d.source === 'write-in')
      .map(([id, d]) => ({ id, label: d.label || id, multi: d.multi || false, icon: '🏆' })),
  ];
  const def = all.find(a => a.id === awardId);
  if (!def) return;

  const cardEl = document.getElementById(`card-${awardId}`);
  if (!cardEl) return;
  cardEl.outerHTML = voteCardHtml(def);

  // Re-focus input
  setTimeout(() => document.getElementById(`input-${awardId}`)?.focus(), 50);
  updateProgress();
}

// ── Player search ─────────────────────────────────────────────────────────────
function handleSearch(inputEl, awardId) {
  const q = inputEl.value.trim().toLowerCase();
  const dropdown = document.getElementById(`drop-${awardId}`);
  if (!dropdown) return;

  // Clear pending selection since user is typing again
  if (pendingVotes[awardId] && !pendingVotes[awardId].cleared) {
    pendingVotes[awardId] = null;
    document.getElementById(`card-${awardId}`)?.classList.remove('voted');
  }

  if (!q) { dropdown.classList.add('hidden'); return; }

  const matches = allPlayers.filter(p => p.displayName.toLowerCase().includes(q)).slice(0, 10);
  if (!matches.length) { dropdown.classList.add('hidden'); return; }

  dropdown.innerHTML = matches.map(p =>
    `<div class="player-dropdown-item" onclick="selectVote('${awardId}', '${p.id}', '${p.displayName.replace(/'/g,"\\'")}', '${p.legacyId || ''}', '${p.currentTeam}')">
      <span class="p-name">${p.displayName}</span>
      <span class="p-team">${p.currentTeam}</span>
    </div>`
  ).join('');
  dropdown.classList.remove('hidden');
  activeDropdownId = awardId;
}

function selectVote(awardId, playerId, playerName, legacyId, team) {
  pendingVotes[awardId] = { playerId, playerName, legacyId: legacyId || null, team };
  const inp = document.getElementById(`input-${awardId}`);
  if (inp) inp.value = playerName;
  const drop = document.getElementById(`drop-${awardId}`);
  if (drop) drop.classList.add('hidden');
  document.getElementById(`card-${awardId}`)?.classList.add('voted');
  updateProgress();
}

// Close dropdowns on outside click
document.addEventListener('click', e => {
  if (!e.target.closest('.player-search-wrap')) {
    document.querySelectorAll('.player-dropdown').forEach(d => d.classList.add('hidden'));
  }
});

// ── Progress ──────────────────────────────────────────────────────────────────
function updateProgress() {
  const allActive = getAllActiveIds();
  const total = allActive.length;
  let voted = 0;
  allActive.forEach(id => {
    const p = pendingVotes[id];
    const v = userVotes[id];
    if (p && !p.cleared && (p.playerName || (p.playerNames && p.playerNames.length))) voted++;
    else if (v && !p?.cleared && (v.playerName || (v.playerNames && v.playerNames.length))) voted++;
  });
  document.getElementById('votedCount').textContent  = voted;
  document.getElementById('totalCount').textContent  = total;
  document.getElementById('progressFill').style.width = total ? `${(voted/total)*100}%` : '0%';
}

function getAllActiveIds() {
  const ids = [];
  INDIVIDUAL_AWARDS.forEach(a => { if (awardsActivity[a.id]?.active !== false) ids.push(a.id); });
  MULTI_AWARDS.forEach(a => { if (awardsActivity[a.id]?.active !== false) ids.push(a.id); });
  TEAMS.forEach(t => { if (awardsActivity[`2026_team-mvp_${t.id}`]?.active !== false) ids.push(`2026_team-mvp_${t.id}`); });
  Object.entries(awardsActivity)
    .filter(([, d]) => d.source === 'write-in' && d.active !== false)
    .forEach(([id]) => ids.push(id));
  return ids;
}

// ── Submit ─────────────────────────────────────────────────────────────────────
async function submitAllVotes() {
  const btn = document.getElementById('submitAllBtn');
  btn.disabled = true;
  btn.textContent = 'Saving…';

  const allActive = getAllActiveIds();
  const mergedVotes = { ...userVotes };

  // Apply pending votes
  allActive.forEach(id => {
    const p = pendingVotes[id];
    if (!p) return;

    if (p.cleared) {
      // User clicked "Change" but didn't pick anyone — keep old vote
      return;
    }

    // Single-winner: check for a typed value if no selection was made
    const inp = document.getElementById(`input-${id}`);
    if (inp && inp.tagName === 'INPUT' && !p.playerName) {
      const typed = inp.value.trim();
      if (typed) mergedVotes[id] = { playerName: typed, playerId: null, legacyId: null, votedAt: new Date().toISOString() };
      return;
    }
    if (inp && inp.tagName === 'TEXTAREA') {
      const names = inp.value.trim().split('\n').map(s => s.trim()).filter(Boolean);
      if (names.length) mergedVotes[id] = { playerNames: names, votedAt: new Date().toISOString() };
      return;
    }

    mergedVotes[id] = {
      playerName:  p.playerName  || null,
      playerNames: p.playerNames || [],
      playerId:    p.playerId    || null,
      legacyId:    p.legacyId    || null,
      votedAt:     new Date().toISOString(),
    };
  });

  try {
    await setDoc(doc(db, 'aceyVotes', currentUser.uid), {
      votes: mergedVotes,
      voterName: currentUser.displayName || currentUser.email || 'Anonymous',
      updatedAt: serverTimestamp(),
    });
    userVotes = mergedVotes;
    pendingVotes = {};
    renderAll();
    showToast('✅ Votes saved!', 'success');
  } catch(e) {
    console.error('Submit error:', e);
    showToast('Save failed: ' + e.message, 'error');
  }

  btn.disabled = false;
  btn.textContent = '✅ Submit All Votes';
}

// ── Toast ─────────────────────────────────────────────────────────────────────
function showToast(msg, type = '') {
  const t = document.createElement('div');
  t.className = 'toast' + (type ? ` ${type}` : '');
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3500);
}

// Expose globals needed by inline handlers
window.handleSearch  = handleSearch;
window.selectVote    = selectVote;
window.changeVote    = changeVote;
window.submitAllVotes = submitAllVotes;
</script>
