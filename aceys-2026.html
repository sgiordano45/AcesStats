<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Aceys IV 🏆</title>
  <style>
    :root {
      --gold: #c9a227;
      --gold-light: #f0d060;
      --gold-glow: rgba(201,162,39,0.4);
      --dark: #0d0b08;
      --dark2: #161310;
      --dark3: #201c16;
      --border: #3a342c;
      --text: #f5edd8;
      --text-dim: #9a8c7a;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { min-height: 100vh; background: var(--dark); color: var(--text); font-family: 'Georgia', 'Times New Roman', serif; }

    /* ── Hero ── */
    .hero { text-align: center; padding: 4rem 1.5rem 2.5rem; background: radial-gradient(ellipse at 50% 0%, rgba(201,162,39,0.12) 0%, transparent 70%); }
    .hero-trophy { font-size: 4rem; display: block; margin-bottom: 0.75rem; animation: float 3s ease-in-out infinite; }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
    .hero h1 { font-size: clamp(2rem, 5vw, 3.5rem); color: var(--gold); letter-spacing: 0.04em; text-shadow: 0 0 30px var(--gold-glow); margin-bottom: 0.4rem; }
    .hero .subtitle { color: var(--text-dim); font-size: 1rem; font-style: italic; }
    .hero-divider { width: 60px; height: 2px; background: linear-gradient(to right, transparent, var(--gold), transparent); margin: 1.5rem auto; }

    /* ── Layout ── */
    .container { max-width: 720px; margin: 0 auto; padding: 0 1rem 4rem; }

    /* ── Section headers ── */
    .section-title { text-align: center; color: var(--gold); font-size: 1.1rem; text-transform: uppercase; letter-spacing: 0.12em; margin: 2.5rem 0 1.25rem; font-family: 'Inter', sans-serif; font-weight: 700; }
    .section-rule { border: none; border-top: 1px solid var(--border); margin: 0 auto 1.5rem; max-width: 400px; }

    /* ── Award card ── */
    .award-card { background: var(--dark2); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; margin-bottom: 1rem; text-align: center; position: relative; overflow: hidden; transition: border-color 0.4s; }
    .award-card.revealed { border-color: var(--gold); box-shadow: 0 0 24px rgba(201,162,39,0.2); }
    .award-icon { font-size: 2rem; display: block; margin-bottom: 0.5rem; }
    .award-icon img { width: 4rem; height: 4rem; object-fit: contain; filter: drop-shadow(0 0 8px rgba(201,162,39,0.4)); }
    .award-label { font-size: 0.8rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 0.25rem; font-family: 'Inter', sans-serif; font-weight: 700; }
    .award-sublabel { font-size: 0.75rem; color: var(--text-dim); font-style: italic; margin-bottom: 0.75rem; }
    .award-winner { font-size: 1.5rem; color: var(--gold-light); font-weight: 700; letter-spacing: 0.02em; min-height: 2rem; text-shadow: 0 0 12px rgba(240,208,96,0.4); transition: all 0.5s; }
    .award-winner.hidden-winner { filter: blur(8px); opacity: 0.4; user-select: none; color: var(--text-dim); font-size: 1.2rem; }
    .award-note { font-size: 0.8rem; color: var(--text-dim); margin-top: 0.4rem; font-style: italic; font-family: 'Inter', sans-serif; }

    /* Player stats panel */
    .winner-stats { margin-top: 1rem; padding-top: 0.75rem; border-top: 1px solid rgba(201,162,39,0.2); font-family: 'Inter', sans-serif; }
    .stats-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 0.5rem 1.25rem; margin-bottom: 0.6rem; }
    .stat-chip { text-align: center; }
    .stat-chip .sv { font-size: 1.1rem; font-weight: 700; color: var(--gold-light); }
    .stat-chip .sl { font-size: 0.65rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.08em; }
    .badge-strip { display: flex; flex-wrap: wrap; justify-content: center; gap: 0.4rem; margin-top: 0.5rem; }
    .badge-chip { display: inline-flex; align-items: center; gap: 0.3rem; padding: 0.2rem 0.55rem; border-radius: 20px; font-size: 0.72rem; font-weight: 700; background: rgba(201,162,39,0.15); border: 1px solid rgba(201,162,39,0.3); color: var(--gold-light); }
    .badge-chip.gold   { background: rgba(212,175,55,0.25); border-color: #c9a227; color: #f0d060; }
    .badge-chip.silver { background: rgba(160,160,160,0.2); border-color: #9ca3af; color: #d1d5db; }
    .badge-chip.bronze { background: rgba(180,100,40,0.2); border-color: #92400e; color: #fbbf24; }

    /* Multi-winner list */
    .multi-winner-list { list-style: none; margin: 0; padding: 0; }
    .multi-winner-list li { font-size: 1.1rem; color: var(--gold-light); font-weight: 600; padding: 0.3rem 0; border-bottom: 1px solid rgba(201,162,39,0.15); letter-spacing: 0.02em; }
    .multi-winner-list li:last-child { border-bottom: none; }
    .multi-winner-list.hidden-winner li { filter: blur(8px); opacity: 0.4; user-select: none; }

    /* Reveal shimmer animation */
    @keyframes revealShimmer {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(200%); }
    }
    .award-card.just-revealed::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: linear-gradient(90deg, transparent, rgba(201,162,39,0.3), transparent);
      animation: revealShimmer 0.8s ease forwards;
      pointer-events: none;
    }

    /* Pending placeholder */
    .pending-dots { display: inline-flex; gap: 4px; align-items: center; }
    .pending-dots span { width: 6px; height: 6px; background: var(--text-dim); border-radius: 50%; animation: pulse 1.4s ease-in-out infinite; }
    .pending-dots span:nth-child(2) { animation-delay: 0.2s; }
    .pending-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes pulse { 0%,80%,100%{opacity:0.3;transform:scale(0.8)} 40%{opacity:1;transform:scale(1)} }

    /* Loading */
    .loading-screen { text-align: center; padding: 4rem 1rem; color: var(--text-dim); }

    /* Footer */
    .page-footer { text-align: center; padding: 2rem; color: var(--text-dim); font-size: 0.8rem; font-family: 'Inter', sans-serif; border-top: 1px solid var(--border); margin-top: 2rem; }
    .page-footer a { color: var(--gold); text-decoration: none; }

    /* Confetti canvas */
    #confettiCanvas { position: fixed; inset: 0; pointer-events: none; z-index: 9999; }
  </style>
</head>
<body>

<canvas id="confettiCanvas"></canvas>

<div class="hero">
  <span class="hero-trophy">🏆</span>
  <h1>The Aceys IV</h1>
  <p class="subtitle">2026 League Awards Ceremony</p>
  <div class="hero-divider"></div>
</div>

<div class="container">
  <div id="loadingScreen" class="loading-screen">
    <div class="pending-dots"><span></span><span></span><span></span></div>
    <p style="margin-top:1rem;">Loading awards…</p>
  </div>

  <div id="awardsContent" style="display:none;">

    <!-- Individual awards -->
    <div class="section-title">🏅 Individual Awards</div>
    <hr class="section-rule">
    <div id="individualList"></div>

    <!-- Team MVPs -->
    <div class="section-title">🦁 Team MVPs</div>
    <hr class="section-rule">
    <div id="teamMvpList"></div>

    <!-- All Aces / Gold Gloves -->
    <div class="section-title">⭐ All-League Teams</div>
    <hr class="section-rule">
    <div id="multiAwardList"></div>

    <!-- Write-in / Special Awards (only shown if any exist) -->
    <div id="writeInSection" style="display:none;">
      <div class="section-title">🏆 Special Awards</div>
      <hr class="section-rule">
      <div id="writeInList"></div>
    </div>

  </div>
</div>

<footer class="page-footer">
  <a href="index.html">← Aces Stats</a>
</footer>

<script type="module">
import { db } from './firebase-config.js';
import {
  collection, onSnapshot, getDocs, doc, getDoc
} from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

// ── Award definitions (same order as admin page) ──────────────────────────────
const INDIVIDUAL_AWARDS = [
  { id: '2026_mvp',           label: 'MVP',                          img: 'awards/mvp.png',                          multi: false },
  { id: '2026_pitcher',       label: 'Pitcher of the Year',          img: 'awards/pitcher_of_the_year.png',          multi: false },
  { id: '2026_rookie',        label: 'Rookie of the Year',           img: 'awards/rookie_of_the_year.png',           multi: false },
  { id: '2026_comeback',      label: 'Comeback Player of the Year',  img: 'awards/comeback_player_of_the_year.png',  multi: false },
  { id: '2026_slugger',       label: 'Slugger of the Year',          img: 'awards/slugger_of_the_year.png',          multi: false },
  { id: '2026_most-improved', label: 'Most Improved Ace',            img: 'awards/most_improved_ace.png',            multi: false },
  { id: '2026_iron-man',      label: 'Iron Man Award',               img: 'awards/iron_man_award.png',               multi: false },
  { id: '2026_captain',       label: 'Captain of the Year',          img: 'awards/captain_of_the_year.png',          multi: false },
  { id: '2026_sub',           label: 'Sub of the Year',              img: 'awards/sub_of_the_year.png',              multi: false },
  { id: '2026_good-guy',      label: 'Al Pineda Good Guy Award',     img: 'awards/al_pineda_good_guy_award.png',     multi: false },
  { id: '2026_lund',          label: 'Erik Lund Perseverance Award', img: 'awards/erik_lund_perservenance_award.png',multi: false },
  { id: '2026_streaman',      label: 'Mr. Streaman Award',           img: 'awards/mr_streaman_award_for_excellence.png', multi: false },
];

const MULTI_AWARDS = [
  { id: '2026_all-aces',   label: 'All Aces Team',   img: 'awards/all_aces.png',   multi: true },
  { id: '2026_gold-glove', label: 'Gold Glove Team', img: 'awards/gold_glove.png', multi: true },
];

let TEAMS = [];
let awardsCache = {};
let prevRevealed = new Set();
const playerStatsCache = {}; // playerId/legacyId → { hitting, pitching, badges }

// ── Determine award category type ────────────────────────────────────────────
const PITCHING_AWARD_IDS = new Set(['2026_pitcher']);
function isPitchingAward(awardId) { return PITCHING_AWARD_IDS.has(awardId); }

// ── Fetch player stats + badges ────────────────────────────────────────────
async function fetchPlayerStats(awardId, data) {
  const pid = data.playerId || data.legacyId;
  if (!pid || !data.revealed) return null;

  const cacheKey = pid + '_' + awardId;
  if (playerStatsCache[cacheKey]) return playerStatsCache[cacheKey];

  const result = { hitting: null, pitching: null, badges: [] };

  try {
    // Try aggregatedPlayerStats
    const statsSnap = await getDoc(doc(db, 'aggregatedPlayerStats', pid));
    if (statsSnap.exists()) {
      const d = statsSnap.data();
      // Find 2026-summer season key
      const seasonKeys = Object.keys(d.seasons || {}).filter(k => k.startsWith('2026'));
      if (seasonKeys.length > 0) {
        const s = d.seasons[seasonKeys[0]];
        result.hitting = {
          H:   s.hits       || 0,
          R:   s.runs       || 0,
          BB:  s.walks      || 0,
          AVG: s.battingAverage != null ? Number(s.battingAverage).toFixed(3) : null,
          BPI: typeof s.acesBPI === 'number' ? s.acesBPI.toFixed(2) : null,
          WAR: typeof s.bwarSimp === 'number' ? s.bwarSimp.toFixed(2) : null,
          IP:  s.inningsPitched != null ? s.inningsPitched : null,
          RA:  s.runsAllowed   != null ? s.runsAllowed    : null,
        };
        result.pitching = result.hitting; // same object, cardHtml picks fields
      }
    }
  } catch(e) { /* stats unavailable */ }

  // Badges
  try {
    const badgeSnap = await getDoc(doc(db, 'playerBadges', `2026-summer_${pid}`));
    if (badgeSnap.exists()) {
      const bd = badgeSnap.data();
      result.badges = Object.entries(bd.earned || {})
        .map(([id, v]) => ({ id, ...v }))
        .sort((a, b) => ({ gold: 0, silver: 1, bronze: 2 }[a.tier] ?? 3) - ({ gold: 0, silver: 1, bronze: 2 }[b.tier] ?? 3))
        .slice(0, 8);
    }
  } catch(e) { /* badges unavailable */ }

  playerStatsCache[cacheKey] = result;
  return result;
}

// After a reveal, load stats and inject into card
async function injectPlayerStats(awardId, data) {
  const stats = await fetchPlayerStats(awardId, data);
  const cardEl = document.getElementById(`card-${awardId}`);
  const panelEl = cardEl?.querySelector('.winner-stats');
  if (!panelEl || !stats) return;

  const s = stats.hitting;
  if (!s) { panelEl.innerHTML = ''; return; }

  const pitching = isPitchingAward(awardId);
  let statHtml = '';

  if (pitching && s.IP != null) {
    statHtml = `
      <div class="stats-grid">
        <div class="stat-chip"><div class="sv">${s.IP}</div><div class="sl">IP</div></div>
        ${s.RA != null ? `<div class="stat-chip"><div class="sv">${s.RA}</div><div class="sl">RA</div></div>` : ''}
      </div>`;
  } else if (!pitching && (s.H || s.R || s.BB || s.AVG)) {
    statHtml = `
      <div class="stats-grid">
        ${s.H  != null ? `<div class="stat-chip"><div class="sv">${s.H}</div><div class="sl">H</div></div>` : ''}
        ${s.R  != null ? `<div class="stat-chip"><div class="sv">${s.R}</div><div class="sl">R</div></div>` : ''}
        ${s.BB != null ? `<div class="stat-chip"><div class="sv">${s.BB}</div><div class="sl">BB</div></div>` : ''}
        ${s.AVG ? `<div class="stat-chip"><div class="sv">${s.AVG}</div><div class="sl">AVG</div></div>` : ''}
        ${s.BPI ? `<div class="stat-chip"><div class="sv">${s.BPI}</div><div class="sl">AcesBPI</div></div>` : ''}
        ${s.WAR ? `<div class="stat-chip"><div class="sv">${s.WAR}</div><div class="sl">bWAR</div></div>` : ''}
      </div>`;
  }

  const badgeHtml = stats.badges.length
    ? `<div class="badge-strip">${stats.badges.map(b =>
        `<span class="badge-chip ${b.tier || ''}">${b.icon || '🎖️'} ${b.name || b.id}</span>`
      ).join('')}</div>`
    : '';

  panelEl.innerHTML = statHtml + badgeHtml || '<div style="color:var(--text-dim);font-size:0.8rem;">No 2026 stats on file</div>';
}

// ── Init ──────────────────────────────────────────────────────────────────────
async function init() {
  // Load teams
  try {
    const snap = await getDocs(collection(db, 'teams'));
    TEAMS = snap.docs
      .map(d => ({ id: d.id, name: d.data().teamName || d.data().name || d.id }))
      .filter(t => !['kings', 'white'].includes(t.name.toLowerCase()))
      .sort((a, b) => a.name.localeCompare(b.name));
  } catch(e) { TEAMS = []; }

  // Real-time listener — requires Firestore rule: allow read: if true; on aceyAwards
  onSnapshot(collection(db, 'aceyAwards'), snap => {
    const newCache = {};
    snap.docs.forEach(d => { newCache[d.id] = d.data(); });

    // Find newly revealed
    snap.docs.forEach(d => {
      if (d.data().revealed && !prevRevealed.has(d.id) && Object.keys(awardsCache).length > 0) {
        // This is a fresh reveal — trigger confetti
        triggerConfetti();
      }
    });

    // Update prev state
    prevRevealed = new Set(snap.docs.filter(d => d.data().revealed).map(d => d.id));
    awardsCache = newCache;

    document.getElementById('loadingScreen').style.display = 'none';
    document.getElementById('awardsContent').style.display = 'block';
    renderAll();
  }, err => {
    console.error('aceyAwards listener error:', err);
    document.getElementById('loadingScreen').innerHTML =
      '<p style="color:#f87171;">⚠️ Could not load awards. Firestore rules may need updating.<br><code style="font-size:0.75rem;">match /aceyAwards/{id} { allow read: if true; }</code></p>';
  });
}

// ── Render ────────────────────────────────────────────────────────────────────
function renderAll() {
  const activeIndividual = INDIVIDUAL_AWARDS.filter(a => awardsCache[a.id]?.active !== false);
  const activeMulti = MULTI_AWARDS.filter(a => awardsCache[a.id]?.active !== false);
  renderList('individualList', activeIndividual);
  renderTeamMvps();
  renderList('multiAwardList', activeMulti);
  renderWriteIns();

  // Inject stats for all revealed single-winner awards
  const allSingle = [
    ...activeIndividual,
    ...TEAMS.map(t => ({ id: `2026_team-mvp_${t.id}`, multi: false })),
    ...Object.entries(awardsCache)
      .filter(([, d]) => d.source === 'write-in' && d.active !== false)
      .map(([id]) => ({ id, multi: false })),
  ];
  allSingle.forEach(a => {
    const data = awardsCache[a.id] || {};
    if (data.revealed && (data.playerId || data.legacyId)) {
      injectPlayerStats(a.id, data);
    }
  });
}

function renderList(containerId, awards) {
  const el = document.getElementById(containerId);
  if (!el) return;
  el.innerHTML = awards.map(a => cardHtml(a)).join('');
}

function renderTeamMvps() {
  const el = document.getElementById('teamMvpList');
  if (!el) return;
  if (!TEAMS.length) { el.innerHTML = '<p style="text-align:center;color:var(--text-dim);">No teams found.</p>'; return; }
  const activeMvps = TEAMS.filter(team => awardsCache[`2026_team-mvp_${team.id}`]?.active !== false);
  el.innerHTML = activeMvps.map(team => {
    const def = { id: `2026_team-mvp_${team.id}`, label: `${team.name} MVP`, img: 'awards/team_mvp.png', multi: false, team: team.name };
    return cardHtml(def);
  }).join('');
}

function renderWriteIns() {
  const writeIns = Object.entries(awardsCache)
    .filter(([, d]) => d.source === 'write-in' && d.active !== false)
    .map(([id, d]) => ({ id, label: d.label || id, multi: false, icon: '🏆' }));
  const section = document.getElementById('writeInSection');
  const el = document.getElementById('writeInList');
  if (!el || !section) return;
  if (!writeIns.length) { section.style.display = 'none'; return; }
  section.style.display = 'block';
  el.innerHTML = writeIns.map(a => cardHtml(a)).join('');
}

function cardHtml(a) {
  const data = awardsCache[a.id] || {};
  const revealed = !!data.revealed;
  const hasWinner = a.multi ? (data.playerNames && data.playerNames.length > 0) : !!data.playerName;

  let winnerHtml;
  if (!hasWinner) {
    winnerHtml = `<div class="award-winner" style="font-size:1rem;color:var(--text-dim);font-style:italic;">To be announced…</div>`;
  } else if (a.multi) {
    const cls = revealed ? '' : ' hidden-winner';
    const names = (data.playerNames || []).map(n => `<li>${n}</li>`).join('');
    winnerHtml = `<ul class="multi-winner-list${cls}">${names}</ul>`;
  } else {
    const cls = revealed ? '' : ' hidden-winner';
    winnerHtml = `<div class="award-winner${cls}">${data.playerName || ''}</div>`;
  }

  const iconHtml = a.img
    ? `<span class="award-icon"><img src="${a.img}" alt="${a.label}"></span>`
    : `<span class="award-icon">${a.icon || '🏆'}</span>`;

  // Stats panel — only for revealed single-winner awards with a linked player
  const showStats = revealed && !a.multi && (data.playerId || data.legacyId);

  return `
    <div class="award-card ${revealed ? 'revealed' : ''}" id="card-${a.id}">
      ${iconHtml}
      <div class="award-label">${a.label}</div>
      ${a.team ? `<div class="award-sublabel">${a.team}</div>` : ''}
      ${winnerHtml}
      ${data.note && revealed ? `<div class="award-note">${data.note}</div>` : ''}
      ${!revealed && hasWinner ? `<div style="margin-top:0.75rem;font-size:0.78rem;color:var(--text-dim);font-family:'Inter',sans-serif;">🔒 Not yet revealed</div>` : ''}
      <div class="winner-stats">${showStats ? '<div style="color:var(--text-dim);font-size:0.75rem;font-family:Inter,sans-serif;">Loading stats…</div>' : ''}</div>
    </div>`;
}

// ── Confetti ──────────────────────────────────────────────────────────────────
const canvas = document.getElementById('confettiCanvas');
const ctx = canvas.getContext('2d');
let particles = [];
let animating = false;

function triggerConfetti() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  const COLORS = ['#c9a227','#f0d060','#ffffff','#ffd700','#ffe680','#c8a84b'];
  for (let i = 0; i < 160; i++) {
    particles.push({
      x: Math.random() * canvas.width,
      y: -10 - Math.random() * 40,
      r: Math.random() * 6 + 3,
      color: COLORS[Math.floor(Math.random() * COLORS.length)],
      vx: (Math.random() - 0.5) * 4,
      vy: Math.random() * 4 + 2,
      rot: Math.random() * Math.PI * 2,
      rotV: (Math.random() - 0.5) * 0.2,
      shape: Math.random() < 0.5 ? 'rect' : 'circle',
      alpha: 1,
    });
  }
  if (!animating) animateConfetti();
}

function animateConfetti() {
  animating = true;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  particles.forEach(p => {
    ctx.save();
    ctx.globalAlpha = p.alpha;
    ctx.fillStyle = p.color;
    ctx.translate(p.x, p.y);
    ctx.rotate(p.rot);
    if (p.shape === 'rect') {
      ctx.fillRect(-p.r, -p.r / 2, p.r * 2, p.r);
    } else {
      ctx.beginPath();
      ctx.arc(0, 0, p.r / 2, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.07;
    p.rot += p.rotV;
    if (p.y > canvas.height * 0.8) p.alpha -= 0.015;
  });
  particles = particles.filter(p => p.alpha > 0);
  if (particles.length > 0) {
    requestAnimationFrame(animateConfetti);
  } else {
    animating = false;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
  }
}

window.addEventListener('resize', () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});

init();
</script>

</body>
</html>
