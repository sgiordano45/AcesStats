<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weekend Preview - Mountainside Aces</title>
<meta name="theme-color" content="#2d5016">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="stylesheet" href="mobile-enhancements.css">
<link rel="stylesheet" href="nav-styles.css">
<link rel="stylesheet" href="dark-mode.css">

<style>
:root {
  --primary-color: #2d5016;
  --secondary-color: #1a6b4a;
  --accent-color: #ffd700;
  --card-bg: #ffffff;
  --text-dark: #2d3748;
  --text-light: #718096;
  --border-color: #e2e8f0;
  --shadow-sm: 0 2px 8px rgba(0,0,0,0.08);
  --shadow-md: 0 4px 16px rgba(0,0,0,0.12);
  --shadow-lg: 0 12px 32px rgba(0,0,0,0.16);
}

* {
  box-sizing: border-box;
}

html {
  overflow-x: hidden;
  scroll-behavior: smooth;
}

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  margin: 0;
  padding: 0;
  background: linear-gradient(135deg, #f7fafc 0%, #edf2f7 100%);
  min-height: 100vh;
  overflow-x: hidden;
  color: var(--text-dark);
}

/* Loading Overlay */
.loading-overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(255,255,255,0.95);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 9999;
  transition: opacity 0.5s ease, visibility 0.5s ease;
}

.loading-overlay.hidden {
  opacity: 0;
  visibility: hidden;
}

.softball-spinner {
  position: relative;
}

.softball-spinner::before {
  content: '⚾';
  font-size: 80px;
  animation: spin 1.5s ease-in-out infinite;
  display: block;
}

@keyframes spin {
  0%, 100% { transform: rotate(0deg) scale(1); }
  50% { transform: rotate(180deg) scale(1.1); }
}

#news-banner-container {
  position: relative;
  z-index: 1000;
  width: 100%;
}

/* Header */
.header {
  background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
  color: white;
  text-align: center;
  padding: 4rem 2rem;
  box-shadow: var(--shadow-lg);
  position: relative;
  overflow: hidden;
}

.header::before {
  content: '';
  position: absolute;
  top: -100px;
  right: -100px;
  width: 300px;
  height: 300px;
  background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
  border-radius: 50%;
}

.header::after {
  content: '🔮';
  position: absolute;
  bottom: -40px;
  left: -40px;
  font-size: 200px;
  opacity: 0.05;
}

.header h1 {
  margin: 0;
  font-size: 3.5rem;
  font-weight: 800;
  text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
  position: relative;
  z-index: 1;
}

.header p {
  margin: 1rem 0 0 0;
  font-size: 1.2rem;
  opacity: 0.95;
  position: relative;
  z-index: 1;
}

/* Dashboard Container */
.dashboard-container {
  max-width: 1400px;
  margin: 3rem auto;
  padding: 0 2rem;
}

/* Navigation */
.filters-nav {
  background: var(--card-bg);
  padding: 1.5rem;
  border-radius: 16px;
  margin-bottom: 2rem;
  box-shadow: var(--shadow-sm);
  border: 1px solid var(--border-color);
}

.nav-container {
  display: flex;
  flex-wrap: wrap;
  gap: 1rem;
  align-items: center;
  justify-content: center;
}

.nav-link {
  padding: 1rem 1.75rem;
  border: 2px solid var(--primary-color);
  background: white;
  color: var(--primary-color);
  text-decoration: none;
  border-radius: 12px;
  font-weight: 600;
  transition: all 0.3s ease;
  display: flex;
  align-items: center;
  gap: 0.5rem;
  white-space: nowrap;
  position: relative;
  overflow: hidden;
  z-index: 1;
}

.nav-link::before {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: var(--primary-color);
  transform: translateX(-100%);
  transition: transform 0.3s ease;
  z-index: -1;
}

.nav-link:hover::before {
  transform: translateX(0);
}

.nav-link:hover {
  color: white;
  transform: translateY(-2px);
  box-shadow: var(--shadow-md);
}

.nav-link.active {
  background: var(--primary-color);
  color: white;
}

/* Section Title */
.section-title {
  font-size: 2rem;
  font-weight: 700;
  display: flex;
  align-items: center;
  gap: 1rem;
  margin-bottom: 1.5rem;
  color: var(--text-dark);
}

.section-title::before {
  content: "";
  width: 8px;
  height: 36px;
  background: linear-gradient(180deg, var(--primary-color) 0%, var(--secondary-color) 100%);
  border-radius: 4px;
}

.section-title::after {
  content: '';
  flex: 1;
  height: 2px;
  background: linear-gradient(90deg, var(--border-color) 0%, transparent 100%);
}

/* Weather Module */
.weather-module {
  background: var(--card-bg);
  border-radius: 16px;
  padding: 2rem;
  margin-bottom: 2rem;
  box-shadow: var(--shadow-sm);
  border: 1px solid var(--border-color);
  position: relative;
  overflow: hidden;
}

.weather-module::before {
  content: "";
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 5px;
  background: linear-gradient(90deg, #2196F3 0%, #64B5F6 100%);
}

.weather-header {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0.75rem;
  margin-bottom: 1.5rem;
}

.weather-header h3 {
  margin: 0;
  color: var(--text-dark);
  font-size: 1.5rem;
  font-weight: 700;
}

.weather-icon {
  font-size: 1.8rem;
}

.weather-content {
  display: grid;
  grid-template-columns: auto 1fr 2fr;
  gap: 2rem;
  align-items: center;
}

.weather-image-section {
  text-align: center;
}

.weather-image-label {
  font-size: 0.75rem;
  font-weight: 700;
  color: var(--primary-color);
  margin-bottom: 0.5rem;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.weather-image {
  width: 100px;
  height: 100px;
  object-fit: cover;
  border-radius: 12px;
  border: 2px solid var(--border-color);
  box-shadow: var(--shadow-sm);
}

.current-weather {
  text-align: center;
  min-width: 200px;
}

.temperature {
  font-size: 2.5rem;
  font-weight: 800;
  color: var(--text-dark);
}

.weather-description {
  font-size: 1.1rem;
  color: var(--text-light);
  margin-bottom: 0.5rem;
  text-transform: capitalize;
  font-weight: 600;
}

.weather-details {
  font-size: 0.9rem;
  color: var(--text-light);
  line-height: 1.6;
}

.forecast {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 1rem;
}

.forecast-item {
  text-align: center;
  background: #f8f9fa;
  padding: 1rem 0.75rem;
  border-radius: 12px;
  border: 1px solid var(--border-color);
  transition: all 0.3s ease;
}

.forecast-item:hover {
  transform: translateY(-4px);
  box-shadow: var(--shadow-sm);
}

.forecast-day {
  font-size: 0.85rem;
  font-weight: 700;
  color: var(--text-dark);
  margin-bottom: 0.5rem;
}

.forecast-temp {
  font-size: 1.1rem;
  color: var(--text-dark);
  margin-bottom: 0.3rem;
  font-weight: 700;
}

.forecast-desc {
  font-size: 0.75rem;
  color: var(--text-light);
  text-transform: capitalize;
  line-height: 1.3;
}

.weather-loading, .weather-error {
  text-align: center;
  padding: 2rem;
  color: var(--text-light);
}

.weather-status {
  text-align: center;
  margin-top: 1rem;
  padding: 0.5rem 1rem;
  background: #fff3cd;
  border-radius: 8px;
  font-size: 0.85rem;
  color: #856404;
}

/* Weekend Info Box */
.weekend-info {
  background: var(--card-bg);
  border-radius: 16px;
  padding: 2rem;
  margin-bottom: 2rem;
  box-shadow: var(--shadow-sm);
  border: 1px solid var(--border-color);
  text-align: center;
  position: relative;
  overflow: hidden;
}

.weekend-info::before {
  content: "";
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 5px;
  background: linear-gradient(90deg, var(--primary-color) 0%, var(--secondary-color) 100%);
}

.weekend-info h3 {
  margin: 0 0 0.5rem 0;
  font-size: 1.75rem;
  font-weight: 800;
  color: var(--text-dark);
}

.weekend-info p {
  margin: 0;
  color: var(--text-light);
  font-size: 1.1rem;
}

.weekend-info .loading {
  padding: 2rem;
  color: var(--text-light);
}

/* Games Grid */
.games-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
  gap: 2rem;
}

/* Game Card */
.game-card {
  background: var(--card-bg);
  border-radius: 16px;
  padding: 1.5rem;
  box-shadow: var(--shadow-sm);
  border: 1px solid var(--border-color);
  transition: all 0.3s ease;
  text-decoration: none;
  color: inherit;
  display: block;
  position: relative;
  overflow: hidden;
}

.game-card::before {
  content: "";
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 4px;
  background: linear-gradient(90deg, var(--primary-color) 0%, var(--secondary-color) 100%);
}

.game-card:hover {
  transform: translateY(-4px);
  box-shadow: var(--shadow-lg);
}

/* Share Tonight's Games button */
.share-tonight-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  margin-top: 10px;
  padding: 8px 16px;
  background: var(--primary, #2d5016);
  color: #fff;
  border: none;
  border-radius: 8px;
  font-size: 0.85rem;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.15s, transform 0.1s;
}
.share-tonight-btn:hover { background: #1a6b4a; }
.share-tonight-btn:active { transform: scale(0.97); }
.share-tonight-btn:disabled { opacity: 0.6; cursor: not-allowed; }

/* Share button on each card */
.card-share-btn {
  position: absolute;
  top: 14px;
  right: 14px;
  z-index: 10;
  background: rgba(255,255,255,0.85);
  border: 1px solid rgba(0,0,0,0.12);
  border-radius: 8px;
  padding: 5px 9px;
  font-size: 0.8rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 4px;
  color: #555;
  font-weight: 600;
  backdrop-filter: blur(4px);
  transition: background 0.15s, transform 0.1s;
  line-height: 1;
}
.card-share-btn:hover { background: rgba(255,255,255,1); transform: scale(1.05); }
.card-share-btn:active { transform: scale(0.97); }

/* Share modal */
.share-card-modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 9999;
  display: flex; align-items: center; justify-content: center;
  padding: 20px;
}
.share-card-modal {
  background: white;
  border-radius: 16px;
  padding: 1.5rem;
  max-width: 360px;
  width: 100%;
  box-shadow: 0 20px 60px rgba(0,0,0,0.25);
  position: relative;
}
.share-card-modal h3 { margin: 0 0 0.5rem; font-size: 1.05rem; color: #2d3748; }
.share-card-modal p  { margin: 0 0 1.1rem; font-size: 0.85rem; color: #718096; }
.share-card-modal-close {
  position: absolute; top: 12px; right: 14px;
  background: none; border: none; font-size: 1.3rem;
  cursor: pointer; color: #718096; line-height: 1;
}
.share-card-opt {
  display: flex; align-items: center; gap: 0.75rem;
  width: 100%; padding: 0.85rem 1rem;
  margin-bottom: 0.6rem;
  background: #f7fafc; border: 1px solid #e2e8f0;
  border-radius: 10px; cursor: pointer;
  font-size: 0.875rem; text-align: left;
  transition: background 0.15s;
}
.share-card-opt:hover { background: #edf2f7; }
.share-card-opt.success { background: #f0fff4; border-color: #68d391; color: #276749; }
.share-card-opt-icon { font-size: 1.4rem; flex-shrink: 0; }
.share-card-opt-title { font-weight: 700; color: #2d3748; margin-bottom: 2px; }
.share-card-opt-desc  { font-size: 0.78rem; color: #718096; }
.share-card-opt.success .share-card-opt-title { color: #276749; }

[data-theme="dark"] .card-share-btn { background: rgba(30,41,59,0.9); color: #cbd5e0; border-color: rgba(255,255,255,0.15); }
[data-theme="dark"] .share-card-modal { background: #1e293b; }
[data-theme="dark"] .share-card-modal h3 { color: #f1f5f9; }
[data-theme="dark"] .share-card-opt { background: #334155; border-color: #475569; }
[data-theme="dark"] .share-card-opt:hover { background: #3d5068; }
[data-theme="dark"] .share-card-opt-title { color: #f1f5f9; }

.game-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 1.25rem;
  padding-bottom: 1rem;
  border-bottom: 1px solid var(--border-color);
}

.game-date {
  font-weight: 700;
  color: var(--primary-color);
  font-size: 1rem;
}

.game-type {
  font-size: 0.8rem;
  font-weight: 600;
  color: white;
  background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
  padding: 0.3rem 0.75rem;
  border-radius: 20px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.teams-matchup {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  gap: 1rem;
  align-items: center;
  margin-bottom: 1.25rem;
}

.team-info {
  text-align: center;
}

.team-logo {
  width: 60px;
  height: 60px;
  object-fit: contain;
  margin-bottom: 0.5rem;
  border-radius: 50%;
  background: white;
  padding: 4px;
  box-shadow: var(--shadow-sm);
}

.team-name {
  font-size: 1.25rem;
  font-weight: 800;
  color: var(--text-dark);
  margin-bottom: 0.25rem;
}

.team-record {
  font-size: 1.1rem;
  font-weight: 700;
  color: var(--primary-color);
}

.team-standing {
  font-size: 0.85rem;
  color: var(--text-light);
}

.vs-section {
  text-align: center;
}

.vs-text {
  font-size: 1.5rem;
  font-weight: 800;
  color: var(--text-light);
}

.home-indicator {
  font-size: 0.75rem;
  color: var(--primary-color);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-top: 0.25rem;
}

/* Game Odds */
.game-odds {
  display: flex;
  justify-content: center;
  gap: 2rem;
  padding: 1rem;
  background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
  border-radius: 12px;
  margin-bottom: 1rem;
  border: 1px solid var(--border-color);
}

.odds-item {
  text-align: center;
}

.odds-team {
  font-size: 0.85rem;
  font-weight: 600;
  color: var(--text-light);
  margin-bottom: 0.25rem;
}

.odds-value {
  font-size: 1.25rem;
  font-weight: 800;
  color: var(--text-dark);
}

.odds-value.favorite {
  color: var(--primary-color);
}

/* Key Players */
.key-players {
  padding-top: 1rem;
  border-top: 1px solid var(--border-color);
}

.key-players h4 {
  margin: 0 0 1rem 0;
  font-size: 0.9rem;
  font-weight: 700;
  color: var(--text-light);
  text-transform: uppercase;
  letter-spacing: 1px;
  text-align: center;
}

.players-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1rem;
}

.team-players h5 {
  margin: 0 0 0.5rem 0;
  font-size: 0.85rem;
  font-weight: 700;
  color: var(--primary-color);
  text-align: center;
}

.player-list {
  display: flex;
  flex-direction: column;
  gap: 0.25rem;
}

.player-name {
  font-size: 0.85rem;
  color: var(--text-dark);
  text-align: center;
  padding: 0.35rem;
  background: #f8fafc;
  border-radius: 6px;
}

/* No Games Message */
.no-games {
  grid-column: 1 / -1;
  text-align: center;
  padding: 4rem 2rem;
  background: var(--card-bg);
  border-radius: 16px;
  box-shadow: var(--shadow-sm);
  border: 1px solid var(--border-color);
}

.no-games h3 {
  margin: 0 0 0.5rem 0;
  font-size: 1.5rem;
  color: var(--text-dark);
}

.no-games p {
  color: var(--text-light);
  margin-bottom: 1rem;
}

/* Connection Status */
.connection-status {
  position: fixed;
  bottom: 1rem;
  right: 1rem;
  display: flex;
  align-items: center;
  gap: 0.5rem;
  padding: 0.75rem 1rem;
  border-radius: 8px;
  background: #fee2e2;
  color: #991b1b;
  font-size: 0.9rem;
  font-weight: 600;
  box-shadow: var(--shadow-md);
  z-index: 1000;
  transition: all 0.3s ease;
}

.connection-status.online {
  background: #d1fae5;
  color: #065f46;
}

.connection-status.hidden {
  opacity: 0;
  visibility: hidden;
  transform: translateY(20px);
}

/* Responsive */
@media (max-width: 768px) {
  .header h1 {
    font-size: 2rem;
  }
  
  .header {
    padding: 2.5rem 1.5rem;
  }
  
  .dashboard-container {
    margin: 2rem auto;
    padding: 0 1rem;
  }
  
  .weather-content {
    grid-template-columns: 1fr;
    gap: 1.5rem;
  }
  
  .forecast {
    grid-template-columns: repeat(3, 1fr);
  }
  
  .games-grid {
    grid-template-columns: 1fr;
    gap: 1.5rem;
  }
  
  .teams-matchup {
    grid-template-columns: 1fr auto 1fr;
  }
  
  .team-logo {
    width: 50px;
    height: 50px;
  }
  
  .team-name {
    font-size: 1.1rem;
  }
  
  .nav-container {
    justify-content: center;
  }
  
  .nav-link {
    padding: 0.75rem 1.25rem;
    font-size: 0.9rem;
  }
}

@media (max-width: 480px) {
  .forecast {
    grid-template-columns: repeat(2, 1fr);
  }
  
  .forecast-day {
    padding: 0.75rem;
  }
  
  .game-odds {
    gap: 1rem;
  }
  
  .odds-value {
    font-size: 1rem;
  }
}
</style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
  <div class="softball-spinner"></div>
</div>

<div id="news-banner-container"></div>

<div class="filters-nav">
</div>

<header class="header">
  <h1>Weekend Preview</h1>
  <p>Upcoming matchups and game analysis</p>
</header>

<div class="connection-status hidden" id="connectionStatus">
  <span class="status-icon">📡</span>
  <span class="status-text">You're offline</span>
</div>

<div class="dashboard-container">


  <div class="weather-module" id="weatherModule">
    <div class="weather-loading">Loading weather forecast...</div>
  </div>

  <div class="weekend-info" id="weekendInfo">
    <div class="loading">Loading weekend schedule...</div>
  </div>

  <div class="games-grid" id="gamesGrid">
    <div class="loading">Loading upcoming games...</div>
  </div>
</div>

<script src="team-colors.js"></script>
<script type="module">

}
window.toggleMobileMenu = toggleMobileMenu;

  }, 800);

async function loadWeekendData() {
  try {
    console.log('📊 Loading weekend data from Firebase...');
    
    currentSeasonData = await getCurrentSeason();
    console.log('✅ Current season:', currentSeasonData);
    
    // CHECK FOR NULL - If no cached season data, we can't load anything offline

    allGames = (games || []).map(g => {

        "away team": g.awayTeamName || g["away team"] || capitalize(g.awayTeamId) || "",
        "home score": g.homeScore !== undefined ? g.homeScore : (g["home score"] || null),
        "away score": g.awayScore !== undefined ? g.awayScore : (g["away score"] || null),
        winner: capitalize(g.winner || ""),
        game_type: g.game_type === "Playoff" ? "Playoff" :
                   g.gameType === "regular" ? "Regular" :
                   g.gameType === "playoff" ? "Playoff" :
                   capitalize(g.gameType) || "Regular",
        date: dateString,
        year: currentSeasonData.year.toString(),
        season: capitalize(currentSeasonData.season),
        id: g.id || "",
        time: g.time || "",
        round: g.round || "",
        // 2026+ UPDATE: Include preview fields directly from game document
        "home odds": g.homeOdds || null,
        "away odds": g.awayOdds || null,
        preview: g.preview || "",
        previewStatus: g.previewStatus || g.status || "scheduled"
      };
    });
    
    playerData = [];
    players.forEach(p => {
      if (p.seasons && typeof p.seasons === 'object') {
        const matchingKeys = Object.keys(p.seasons).filter(key =>
          key.startsWith(currentSeasonData.id)
        );
        
        matchingKeys.forEach(seasonKey => {
          const seasonStats = p.seasons[seasonKey];
          playerData.push({
            id: p.id || p.playerId || '',
            name: p.name || p.displayName || p.id,
            team: seasonStats.team || p.currentTeam || "",
            year: currentSeasonData.year.toString(),
            season: capitalize(currentSeasonData.season),
            sub: "No",
            atBats: Number(seasonStats.atBats) || 0,
            AcesWar: seasonStats.acesBPI || seasonStats.AcesBPI || seasonStats.AcesWar || "N/A",
            careerAcesBPI: (typeof p.career?.acesBPI === 'number') ? p.career.acesBPI : null,
            careerAtBats:  (typeof p.career?.atBats  === 'number') ? p.career.atBats  : 0
          });
        });
      }
    });
    
    console.log(`✅ Mapped: ${allGames.length} games, ${playerData.length} player records`);

    await loadRostersAndSplits();

  } catch (error) {

}

function parseGameDate(dateStr) {
  return new Date(dateStr);
}

function getWeekendGames() {
  const nextWeek = new Date(today);
  nextWeek.setDate(today.getDate() + 7);
  
  return allGames.filter(g => {
    const gameDate = parseGameDate(g.date);
    const isFuture = gameDate >= today;
    const isWithinWeek = gameDate <= nextWeek;
    const noWinner = !g.winner || g.winner.trim() === "";
    // Include both Regular and Playoff games
    
    return isFuture && isWithinWeek && noWinner;
  }).sort((a, b) => parseGameDate(a.date) - parseGameDate(b.date));
}

function parseTimeString(timeStr) {
  if (!timeStr) return 0;
  
  // Try to parse 12-hour format with AM/PM first (e.g., "9:00 AM", "12:30 PM")
  const ampmMatch = timeStr.match(/(\d+):(\d+)\s*(AM|PM)/i);
  if (ampmMatch) {
    let hours = parseInt(ampmMatch[1]);
    const minutes = parseInt(ampmMatch[2]);
    const period = ampmMatch[3].toUpperCase();
    
    // Convert to 24-hour format
    if (period === 'PM' && hours !== 12) {
      hours += 12;
    } else if (period === 'AM' && hours === 12) {
      hours = 0;
    }
    
    return hours * 60 + minutes; // Return total minutes for easy comparison
  }
  
  // Try to parse 24-hour format (e.g., "10:00", "14:30")
  const twentyFourMatch = timeStr.match(/^(\d+):(\d+)$/);
  if (twentyFourMatch) {
    const hours = parseInt(twentyFourMatch[1]);
    const minutes = parseInt(twentyFourMatch[2]);
    return hours * 60 + minutes;
  }
  
  return 0;
}

function calculateTeamRecord(teamName) {
  const currentSeasonGames = allGames.filter(g =>
    g.winner &&
    g.winner.trim() !== "" &&
    (g["home team"] === teamName || g["away team"] === teamName)
  );

  let wins = 0, losses = 0, ties = 0;
  const teamLower = teamName.toLowerCase();
  
  currentSeasonGames.forEach(game => {
    const winnerLower = (game.winner || "").toLowerCase();
    if (winnerLower.includes("tie")) {
      ties++;
    } else if (winnerLower === teamLower) {
      wins++;
    } else {
      losses++;
    }
  });

  const totalGames = wins + losses + ties;
  const winPct = totalGames > 0 ? (wins + ties * 0.5) / totalGames : 0;

  return { wins, losses, ties, winPct };
}

function calculateTeamStanding(teamName) {
  const completedGames = allGames.filter(g =>
    parseGameDate(g.date) < today &&
    g.winner &&
    g.winner.trim() !== "" &&
    g.game_type === 'Regular'
  );
  
  const teamStats = {};
  
  completedGames.forEach(game => {
    const homeTeam = game["home team"];
    const awayTeam = game["away team"];
    const winner = game.winner;
    const homeScore = parseInt(game["home score"]) || 0;
    const awayScore = parseInt(game["away score"]) || 0;

    if (!teamStats[homeTeam]) {
      teamStats[homeTeam] = {
        name: homeTeam, wins: 0, losses: 0, ties: 0,
        runsFor: 0, runsAgainst: 0, h2h: {}
      };
    }
    if (!teamStats[awayTeam]) {
      teamStats[awayTeam] = {
        name: awayTeam, wins: 0, losses: 0, ties: 0,
        runsFor: 0, runsAgainst: 0, h2h: {}
      };
    }

    // Track runs
    teamStats[homeTeam].runsFor += homeScore;
    teamStats[homeTeam].runsAgainst += awayScore;
    teamStats[awayTeam].runsFor += awayScore;
    teamStats[awayTeam].runsAgainst += homeScore;

    // Initialize h2h if needed
    if (!teamStats[homeTeam].h2h[awayTeam]) {
      teamStats[homeTeam].h2h[awayTeam] = { wins: 0, losses: 0, ties: 0 };
    }
    if (!teamStats[awayTeam].h2h[homeTeam]) {
      teamStats[awayTeam].h2h[homeTeam] = { wins: 0, losses: 0, ties: 0 };
    }

    if (winner === "Tie") {
      teamStats[homeTeam].ties++;
      teamStats[awayTeam].ties++;
      teamStats[homeTeam].h2h[awayTeam].ties++;
      teamStats[awayTeam].h2h[homeTeam].ties++;
    } else if (winner === homeTeam) {
      teamStats[homeTeam].wins++;
      teamStats[awayTeam].losses++;
      teamStats[homeTeam].h2h[awayTeam].wins++;
      teamStats[awayTeam].h2h[homeTeam].losses++;
    } else if (winner === awayTeam) {
      teamStats[awayTeam].wins++;
      teamStats[homeTeam].losses++;
      teamStats[awayTeam].h2h[homeTeam].wins++;
      teamStats[homeTeam].h2h[awayTeam].losses++;
    }
  });

  const preliminaryStandings = Object.values(teamStats).map(team => {
    const totalGames = team.wins + team.losses + team.ties;
    team.winPct = totalGames > 0 ? (team.wins + team.ties * 0.5) / totalGames : 0;
    team.runDifferential = team.runsFor - team.runsAgainst;
    return team;
  });

  // Helper function for head-to-head comparison
  function compareHeadToHead(teamA, teamB) {
    const aVsB = teamA.h2h[teamB.name];
    const bVsA = teamB.h2h[teamA.name];
    
    if (!aVsB || !bVsA) return 0;
    
    const aH2HWinPct = (aVsB.wins + aVsB.losses) > 0 ? aVsB.wins / (aVsB.wins + aVsB.losses) : 0;
    const bH2HWinPct = (bVsA.wins + bVsA.losses) > 0 ? bVsA.wins / (bVsA.wins + bVsA.losses) : 0;
    
    return bH2HWinPct - aH2HWinPct;
  }

  // Sort with proper tiebreakers (matching current-season.html)
  const standings = preliminaryStandings.sort((a, b) => {
    // 1. Win percentage (ties count as half-win)
    if (a.winPct !== b.winPct) return b.winPct - a.winPct;

    // 2. Most wins
    if (a.wins !== b.wins) return b.wins - a.wins;

    // 3. Fewest losses
    if (a.losses !== b.losses) return a.losses - b.losses;

    // 4. H2H — only if exactly 2 teams tied on win%, wins, and losses
    const teamsAtSameMark = preliminaryStandings.filter(t =>
      t.winPct === a.winPct && t.wins === a.wins && t.losses === a.losses
    );
    if (teamsAtSameMark.length === 2) {
      const h2hComp = compareHeadToHead(a, b);
      if (h2hComp !== 0) return h2hComp;
    }

    // 5. Fewest runs against
    if (a.runsAgainst !== b.runsAgainst) return a.runsAgainst - b.runsAgainst;

    // 6. Run differential
    return b.runDifferential - a.runDifferential;
  });

  const teamPosition = standings.findIndex(team => team.name === teamName) + 1;
  return teamPosition > 0 ? teamPosition : null;
}

function getGamePreview(homeTeam, awayTeam, gameDate) {

  return allGames.find(g => {
    const matchesTeams = (g["home team"] === homeTeam && g["away team"] === awayTeam);
    const matchesDate = g.date === gameDate ||
                       formatDateForComparison(g.date) === formatDateForComparison(gameDate);
    return matchesTeams && matchesDate;
  });

function formatDateForComparison(dateStr) {
  if (!dateStr) return '';
  const date = new Date(dateStr);
  if (isNaN(date.getTime())) return dateStr;
  return `${date.getMonth() + 1}/${date.getDate()}/${date.getFullYear()}`;
}

async function loadRostersAndSplits() {
  // Collect unique teams from all loaded games
  const teams = new Set();
  allGames.forEach(g => {
    if (g['home team']) teams.add(g['home team']);
    if (g['away team']) teams.add(g['away team']);
  });

  const seasonId = currentSeasonData.id;

  // Fetch all rosters in parallel
  await Promise.all([...teams].map(async (team) => {
    try {
      const docId = `${seasonId}-${team.toLowerCase()}`;
      const snap = await getDoc(doc(db, 'rosters', docId));
      rosterIds[team] = snap.exists()
        ? new Set((snap.data().players || []).flatMap(p => [p.id, p.authId].filter(Boolean)))
        : new Set();
    } catch (e) {
      rosterIds[team] = new Set();
    }
  }));

  // Collect all rostered player IDs
  const allRosteredIds = [...new Set(
    Object.values(rosterIds).flatMap(s => [...s])
  )];

  // Batch fetch splits for all rostered players
  await Promise.all(allRosteredIds.map(async (pid) => {
    if (splitsCache[pid]) return;
    try {
      const snap = await getDoc(doc(db, 'aggregatedPlayerStats2025Splits', pid));
      if (snap.exists()) splitsCache[pid] = snap.data();
    } catch (e) { /* silent */ }
  }));

  console.log(`Rosters loaded for ${Object.keys(rosterIds).length} teams, splits for ${Object.keys(splitsCache).length} players`);
}

function getTopPlayers(teamName, opponentTeam) {
  if (!playerData || playerData.length === 0) return [];

  const roster = rosterIds[teamName] || new Set();
  const teamPlayers = playerData.filter(p => p.team === teamName && roster.has(p.id));

  // Stage 1 — vs-opponent OBP, >= 2 games
  if (opponentTeam) {
    const vsOppCandidates = teamPlayers.map(p => {
      const vsOpp = splitsCache[p.id]?.vsOpponent?.[opponentTeam];
      return (vsOpp && vsOpp.games >= 2)
        ? { ...p, _rank: vsOpp.onBasePercentage || 0 }
        : null;
    }).filter(Boolean).sort((a, b) => b._rank - a._rank).slice(0, 3);

    if (vsOppCandidates.length > 0) return vsOppCandidates.map(p => p.name);
  }

  // Stage 2 — season AcesBPI with 2 × team games played AB threshold
  const teamGamesPlayed = allGames.filter(g =>
    g.winner && g.winner.trim() !== '' &&
    (g['home team'] === teamName || g['away team'] === teamName)
  ).length;
  const minAtBats = teamGamesPlayed * 2;

  const seasonCandidates = teamPlayers
    .filter(p => typeof p.AcesWar === 'number' && p.AcesWar !== 'N/A' && p.atBats >= minAtBats)
    .sort((a, b) => b.AcesWar - a.AcesWar)
    .slice(0, 3);

  // DEBUG — remove once key player logic is verified
  const rosterSet = rosterIds[teamName] || new Set();
  const byTeamOnly = playerData.filter(p => p.team === teamName);
  const byRosterOnly = playerData.filter(p => rosterSet.has(p.id));
  console.group(`🔍 Key Players: ${teamName} vs ${opponentTeam}`);
  console.log(`Team games played: ${teamGamesPlayed}, min AB threshold: ${minAtBats}`);
  console.log(`Roster set size for "${teamName}": ${rosterSet.size}`, [...rosterSet]);
  console.log(`Players where p.team === "${teamName}" (${byTeamOnly.length}):`, byTeamOnly.map(p => `${p.name} | id:${p.id} | ${p.atBats}AB | BPI:${p.AcesWar}`));
  console.log(`Players in roster set (${byRosterOnly.length}):`, byRosterOnly.map(p => `${p.name} | id:${p.id} | team:${p.team}`));
  console.log('Final teamPlayers (both match):', teamPlayers.map(p => `${p.name} | ${p.atBats} AB | BPI: ${p.AcesWar}`));
  console.log('Stage 2 qualifiers:', seasonCandidates.map(p => `${p.name} (BPI: ${p.AcesWar}, ABs: ${p.atBats})`));
  console.groupEnd();

  if (seasonCandidates.length > 0) return seasonCandidates.map(p => p.name);

  // Stage 3 — career AcesBPI, min 20 career ABs
  return teamPlayers
    .filter(p => typeof p.careerAcesBPI === 'number' && p.careerAtBats >= 20)
    .sort((a, b) => b.careerAcesBPI - a.careerAcesBPI)
    .slice(0, 3)
    .map(p => p.name);
}

function getCachedWeather() {
  try {
    const cached = localStorage.getItem('weatherCache');
    if (!cached) return null;
    
    const data = JSON.parse(cached);
    const now = Date.now();
    const cacheAge = now - data.timestamp;
    const maxAge = 30 * 60 * 1000; // 30 minutes
    
    if (cacheAge > maxAge) return null;
    
    return data;
  } catch (e) {
    return null;
  }
}

function getStaleWeatherCache() {
  try {
    const cached = localStorage.getItem('weatherCache');
    if (!cached) return null;
    return JSON.parse(cached);
  } catch (e) {
    return null;
  }
}

function cacheWeatherData(current, forecast) {
  try {
    localStorage.setItem('weatherCache', JSON.stringify({
      current,
      forecast,
      timestamp: Date.now()
    }));

    console.warn('Could not cache weather data');

}

function generateWeekendPreview() {
  const weekendGames = getWeekendGames();
  
  // Sort games by date and time
  weekendGames.sort((a, b) => {
    const dateA = parseGameDate(a.date);
    const dateB = parseGameDate(b.date);
    
    // First sort by date
    if (dateA.getTime() !== dateB.getTime()) {
      return dateA - dateB;
    }
    
    // If same date, sort by time from game object
    const timeA = a.time;
    const timeB = b.time;
    
    if (timeA && timeB) {
      // Parse time strings (e.g., "9:00 AM", "12:30 PM", or "10:00" in 24-hour)
      const parsedTimeA = parseTimeString(timeA);
      const parsedTimeB = parseTimeString(timeB);
      return parsedTimeA - parsedTimeB;
    }
    
    return 0;
  });
  
  
  const weekendInfoElement = document.getElementById('weekendInfo');
  weekendInfoElement.classList.remove('loading');
  
  if (weekendGames.length === 0) {
    weekendInfoElement.innerHTML = `
      <h3>No Upcoming Games</h3>
      <p>No games scheduled for the next week</p>
    `;
    
    const gamesGridElement = document.getElementById('gamesGrid');
    gamesGridElement.innerHTML = `
      <div class="no-games">
        <h3>No Games This Weekend</h3>
        <p>Check back later for upcoming matchups</p>
        <a href="current-season.html" class="nav-link" style="display: inline-block; margin-top: 1rem;">
          View Full Schedule
        </a>
      </div>
    `;
    return;
  }

  const earliestDate = parseGameDate(weekendGames[0].date);
  const latestDate = parseGameDate(weekendGames[weekendGames.length - 1].date);
  
  let dateRangeText;
  if (earliestDate.toDateString() === latestDate.toDateString()) {
    dateRangeText = earliestDate.toLocaleDateString('en-US', {
      weekday: 'long',
      month: 'long',
      day: 'numeric'
    });
  } else {
    dateRangeText = `${earliestDate.toLocaleDateString('en-US', { 
      month: 'short', 
      day: 'numeric' 
    })} - ${latestDate.toLocaleDateString('en-US', { 
      month: 'short', 
      day: 'numeric' 
    })}`;
  }

  weekendInfoElement.innerHTML = `
    <h3>Upcoming Games</h3>
    <p>${weekendGames.length} games scheduled for ${dateRangeText}</p>
    <button class="share-tonight-btn" onclick="shareTonightGames()">📤 Share Tonight's Games</button>
  `;

  const gamesGridElement = document.getElementById('gamesGrid');
  const gamesHtml = weekendGames.map((game, idx) => createGameCard(game, idx)).join('');
  gamesGridElement.innerHTML = gamesHtml;
}

function createGameCard(game, cardIdx = 0) {
  const homeTeam = game["home team"];
  const awayTeam = game["away team"];
  const gameDate = parseGameDate(game.date);
  
  const homeRecord = calculateTeamRecord(homeTeam);
  const awayRecord = calculateTeamRecord(awayTeam);
  
  const homeStanding = calculateTeamStanding(homeTeam);
  const awayStanding = calculateTeamStanding(awayTeam);
  
  // 2026+ UPDATE: Preview data is now directly on the game object
  // No need to call getGamePreview() - just use the game object's fields
  const homeRecordText = `${homeRecord.wins}-${homeRecord.losses}${homeRecord.ties > 0 ? `-${homeRecord.ties}` : ''}`;
  const awayRecordText = `${awayRecord.wins}-${awayRecord.losses}${awayRecord.ties > 0 ? `-${awayRecord.ties}` : ''}`;
  
  const homeStandingText = homeStanding ? `#${homeStanding}` : 'NR';
  const awayStandingText = awayStanding ? `#${awayStanding}` : 'NR';
  
  let gameDateTime;
  // Check for time directly on game object
  const gameTime = game.time;
  
  if (gameTime) {
    const dateStr = gameDate.toLocaleDateString('en-US', {
      weekday: 'short',
      month: 'short',
      day: 'numeric'
    });
    // If time is in 24-hour format (e.g., "10:00"), convert to 12-hour with AM/PM
    let displayTime = gameTime;
    if (gameTime.match(/^\d{1,2}:\d{2}$/)) {
      const [hours, minutes] = gameTime.split(':').map(Number);
      const period = hours >= 12 ? 'PM' : 'AM';
      const displayHours = hours === 0 ? 12 : hours > 12 ? hours - 12 : hours;
      displayTime = `${displayHours}:${minutes.toString().padStart(2, '0')} ${period}`;
    }
    gameDateTime = `${dateStr} ${displayTime}`;
  } else {
    gameDateTime = gameDate.toLocaleDateString('en-US', {
      weekday: 'short',
      month: 'short',
      day: 'numeric',
      hour: 'numeric',
      minute: '2-digit'
    });
  }

  const homeTeamColor = getTeamColor(homeTeam);
  const cardBackgroundStyle = homeTeamColor ?
    `background: linear-gradient(135deg, rgba(${homeTeamColor}, 0.08) 0%, rgba(${homeTeamColor}, 0.02) 100%) !important;` :
    '';

  // 2026+ UPDATE: Get odds directly from game object
  let oddsHtml = '';
  if (game["home odds"] || game["away odds"]) {
    const homeOdds = parseInt(game["home odds"] || 0);
    const awayOdds = parseInt(game["away odds"] || 0);
    
    if (homeOdds !== 0 || awayOdds !== 0) {
      const homeIsFavorite = homeOdds < 0 && (awayOdds > 0 || homeOdds > awayOdds);
      const awayIsFavorite = awayOdds < 0 && (homeOdds > 0 || awayOdds > homeOdds);

      oddsHtml = `
        <div class="game-odds">
          <div class="odds-item">
            <div class="odds-team">${awayTeam}</div>
            <div class="odds-value ${awayIsFavorite ? 'favorite' : ''}">${awayOdds > 0 ? '+' : ''}${awayOdds}</div>
          </div>
          <div class="odds-item">
            <div class="odds-team">${homeTeam}</div>
            <div class="odds-value ${homeIsFavorite ? 'favorite' : ''}">${homeOdds > 0 ? '+' : ''}${homeOdds}</div>
          </div>
        </div>
      `;
    }
  }

  const homeTopPlayers = getTopPlayers(homeTeam, awayTeam);
  const awayTopPlayers = getTopPlayers(awayTeam, homeTeam);
  
  let keyPlayersHtml = '';
  if (homeTopPlayers.length > 0 || awayTopPlayers.length > 0) {
    keyPlayersHtml = `
      <div class="key-players">
        <h4>Key Players</h4>
        <div class="players-grid">
          <div class="team-players">
            <h5>${awayTeam}</h5>
            <div class="player-list">
              ${awayTopPlayers.length > 0 ? 
                awayTopPlayers.map(player => `<span class="player-name">${player}</span>`).join('') :
                '<span class="player-name">No data available</span>'
              }
            </div>
          </div>
          <div class="team-players">
            <h5>${homeTeam}</h5>
            <div class="player-list">
              ${homeTopPlayers.length > 0 ? 
                homeTopPlayers.map(player => `<span class="player-name">${player}</span>`).join('') :
                '<span class="player-name">No data available</span>'
              }
            </div>
          </div>
        </div>
      </div>
    `;
  }

  // For playoff games with IDs, use game ID; otherwise use team names and date
  const isPlayoffGame = game.id && game.id.startsWith('playoff_');
  const previewLink = isPlayoffGame ? 
    `game-preview.html?gameId=${encodeURIComponent(game.id)}` :
    `game-preview.html?home=${encodeURIComponent(homeTeam)}&away=${encodeURIComponent(awayTeam)}&date=${encodeURIComponent(game.date)}`;

  // Store shareable data on the window for the share handler
  const shareKey = `game_card_${cardIdx}`;
  const awayLogoPath = `logos/${awayTeam.toLowerCase().replace(/\s+/g, '_')}.png`;
  const homeLogoPath = `logos/${homeTeam.toLowerCase().replace(/\s+/g, '_')}.png`;
  window._shareCardData = window._shareCardData || {};
  window._shareCardData[shareKey] = {
    awayTeam, homeTeam, gameDateTime,
    rawDate: game.date,
    gameTime: game.time || null,
    awayRecordText, homeRecordText,
    awayStandingText, homeStandingText,
    awayTopPlayers, homeTopPlayers,
    gameType: game.game_type,
    awayLogoPath, homeLogoPath
  };

  return `
    <a href="${previewLink}"
       id="game-card-${cardIdx}"
       class="game-card" style="${cardBackgroundStyle}">
      <div class="game-header">
        <div class="game-date">${gameDateTime}</div>
        <div class="game-type">${game.game_type} Season</div>
      </div>

      <div class="teams-matchup">
        <div class="team-info">
          <img class="team-logo"
               src="${awayLogoPath}"
               alt="${awayTeam} logo"
               onerror="this.style.display='none'">
          <div class="team-name">${awayTeam}</div>
          <div class="team-record">${awayRecordText}</div>
          <div class="team-standing">${awayStandingText} in standings</div>
        </div>

        <div class="vs-section">
          <div class="vs-text">@</div>
          <div class="home-indicator">Home</div>
        </div>

        <div class="team-info">
          <img class="team-logo"
               src="${homeLogoPath}"
               alt="${homeTeam} logo"
               onerror="this.style.display='none'">
          <div class="team-name">${homeTeam}</div>
          <div class="team-record">${homeRecordText}</div>
          <div class="team-standing">${homeStandingText} in standings</div>
        </div>
      </div>

      ${oddsHtml}
      ${keyPlayersHtml}
      <button class="card-share-btn" onclick="event.preventDefault();event.stopPropagation();openCardShareModal('${shareKey}','game-card-${cardIdx}')" title="Share this matchup">
        📤 Share
      </button>
    </a>
  `;
}

function showError() {
  const weekendInfoElement = document.getElementById('weekendInfo');
  weekendInfoElement.classList.remove('loading');
  weekendInfoElement.innerHTML = `
    <h3>Error Loading Data</h3>
    <p>Unable to load weekend games. Please try again later.</p>
  `;
  
  document.getElementById('gamesGrid').innerHTML = `
    <div class="no-games">
      <h3>Error Loading Games</h3>
      <p>There was an error loading the weekend schedule.</p>
    </div>
  `;
}

function updateConnectionStatus() {
  const status = document.getElementById('connectionStatus');
  if (!status) return;
  
  const icon = status.querySelector('.status-icon');
  const text = status.querySelector('.status-text');
  
  if (navigator.onLine) {
    // Show "Back online" message
    status.classList.remove('hidden');  // SHOW IT FIRST
    status.classList.add('online');
    icon.textContent = '✅';
    text.textContent = 'Back online';
    
    // Hide after 3 seconds
    setTimeout(() => {
      status.classList.add('hidden');
    }, 3000);
  } else {
    // Show "You're offline" message
    status.classList.remove('hidden', 'online');
    icon.textContent = '📡';
    text.textContent = "You're offline";
  }
}

window.addEventListener('online', updateConnectionStatus);
window.addEventListener('offline', updateConnectionStatus);
if (!navigator.onLine) updateConnectionStatus();

<script>
  let _activeShareKey = null;
  let _activeCardId   = null;

  function openCardShareModal(shareKey, cardId) {
    _activeShareKey = shareKey;
    _activeCardId   = cardId;
    const d = (window._shareCardData || {})[shareKey] || {};
    document.getElementById('cardShareModalSubtitle').textContent =
      d.awayTeam && d.homeTeam ? `${d.awayTeam} @ ${d.homeTeam}` : 'Choose how to share this game';
    // Reset buttons
    ['cardShareImgBtn','cardShareTxtBtn'].forEach(id => {
      const btn = document.getElementById(id);
      btn.classList.remove('success');
    });
    document.getElementById('cardShareImgBtn').innerHTML = `<span class="share-card-opt-icon">🖼️</span><span><div class="share-card-opt-title">Save as Image</div><div class="share-card-opt-desc">Download a PNG — perfect for group chats</div></span>`;
    document.getElementById('cardShareTxtBtn').innerHTML = `<span class="share-card-opt-icon">📋</span><span><div class="share-card-opt-title">Copy as Text</div><div class="share-card-opt-desc">Copy a quick matchup summary to clipboard</div></span>`;
    document.getElementById('cardShareModal').style.display = 'flex';
  }

  function closeCardShareModal() {
    document.getElementById('cardShareModal').style.display = 'none';
    _activeShareKey = null;
    _activeCardId   = null;
  }

  async function shareCardImage() {
    const btn = document.getElementById('cardShareImgBtn');
    btn.innerHTML = `<span class="share-card-opt-icon">⏳</span><span><div class="share-card-opt-title">Generating image…</div><div class="share-card-opt-desc">Just a moment</div></span>`;

    try {
      if (!window.html2canvas) {
        await new Promise((resolve, reject) => {
          const s = document.createElement('script');
          s.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
          s.onload = resolve; s.onerror = reject;
          document.head.appendChild(s);
        });
      }

      const d = (window._shareCardData || {})[_activeShareKey] || {};

      // Build off-screen render
      const wrapper = document.createElement('div');
      wrapper.style.cssText = `
        position:fixed; top:-9999px; left:-9999px;
        width:420px; background:#ffffff;
        border-radius:16px; overflow:hidden;
        font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
        box-shadow:0 4px 24px rgba(0,0,0,0.12);
      `;

      const awayColor = getTeamHex(d.awayTeam);
      const homeColor = getTeamHex(d.homeTeam);

      wrapper.innerHTML = `
        <div style="background:linear-gradient(135deg,#2d5016 0%,#1a6b4a 100%);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;">
          <div style="color:#fff;font-weight:800;font-size:1rem;">⚾ Weekend Preview</div>
          <div style="color:rgba(255,255,255,0.8);font-size:0.75rem;font-weight:600;">acessoftballreference.com</div>
        </div>
        <div style="padding:20px 24px;">
          <div style="font-size:0.78rem;color:#718096;font-weight:600;margin-bottom:12px;text-transform:uppercase;letter-spacing:0.5px;">${d.gameDateTime || ''} · ${d.gameType || 'Regular'} Season</div>
          <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:16px;">
            <div style="text-align:center;flex:1;">
              <div style="width:56px;height:56px;border-radius:50%;margin:0 auto 8px;background:${awayColor || '#e2e8f0'};display:flex;align-items:center;justify-content:center;overflow:hidden;">
                <img src="${d.awayLogoPath || ''}" style="width:48px;height:48px;object-fit:contain;" onerror="this.style.display='none';this.parentNode.innerHTML='⚾';">
              </div>
              <div style="font-weight:800;font-size:1.05rem;color:#2d3748;">${d.awayTeam || ''}</div>
              <div style="font-size:0.8rem;color:#718096;margin-top:2px;">${d.awayRecordText || ''}</div>
              <div style="font-size:0.72rem;color:#a0aec0;">${d.awayStandingText || ''}</div>
            </div>
            <div style="text-align:center;font-size:1.4rem;font-weight:900;color:#2d5016;flex-shrink:0;">@</div>
            <div style="text-align:center;flex:1;">
              <div style="width:56px;height:56px;border-radius:50%;margin:0 auto 8px;background:${homeColor || '#e2e8f0'};display:flex;align-items:center;justify-content:center;overflow:hidden;">
                <img src="${d.homeLogoPath || ''}" style="width:48px;height:48px;object-fit:contain;" onerror="this.style.display='none';this.parentNode.innerHTML='🏠';">
              </div>
              <div style="font-weight:800;font-size:1.05rem;color:#2d3748;">${d.homeTeam || ''}</div>
              <div style="font-size:0.8rem;color:#718096;margin-top:2px;">${d.homeRecordText || ''}</div>
              <div style="font-size:0.72rem;color:#a0aec0;">${d.homeStandingText || ''} in standings</div>
            </div>
          </div>
          ${(d.awayTopPlayers?.length || d.homeTopPlayers?.length) ? `
          <div style="background:#f8fafc;border-radius:10px;padding:12px 14px;border:1px solid #e2e8f0;">
            <div style="font-size:0.72rem;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:#718096;margin-bottom:8px;text-align:center;">Key Players</div>
            <div style="display:flex;gap:12px;">
              <div style="flex:1;text-align:center;">
                <div style="font-size:0.72rem;font-weight:600;color:#2d5016;margin-bottom:4px;">${d.awayTeam}</div>
                ${(d.awayTopPlayers || []).map(p => `<div style="font-size:0.82rem;color:#2d3748;padding:2px 0;">${p}</div>`).join('')}
              </div>
              <div style="flex:1;text-align:center;">
                <div style="font-size:0.72rem;font-weight:600;color:#2d5016;margin-bottom:4px;">${d.homeTeam}</div>
                ${(d.homeTopPlayers || []).map(p => `<div style="font-size:0.82rem;color:#2d3748;padding:2px 0;">${p}</div>`).join('')}
              </div>
            </div>
          </div>` : ''}
          <div style="margin-top:12px;font-size:0.72rem;color:#a0aec0;text-align:right;">Generated ${new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}</div>
        </div>
      `;

      document.body.appendChild(wrapper);
      const canvas = await html2canvas(wrapper, { scale:2, backgroundColor:'#ffffff', useCORS:true, logging:false });
      document.body.removeChild(wrapper);

      const link = document.createElement('a');
      link.download = `aces-${(d.awayTeam||'game').toLowerCase()}-vs-${(d.homeTeam||'game').toLowerCase()}-${new Date().toISOString().slice(0,10)}.png`;
      link.href = canvas.toDataURL('image/png');
      link.click();

      btn.classList.add('success');
      btn.innerHTML = `<span class="share-card-opt-icon">✅</span><span><div class="share-card-opt-title">Image saved!</div><div class="share-card-opt-desc">Check your downloads folder</div></span>`;

    } catch(err) {

      btn.innerHTML = `<span class="share-card-opt-icon">🖼️</span><span><div class="share-card-opt-title">Save as Image</div><div class="share-card-opt-desc">Error — try again</div></span>`;
    }
  }

  function getTeamHex(teamName) {
    const colors = {
      green:'#2d7d32', red:'#d32f2f', black:'#424242', blue:'#1976d2',
      gold:'#CFB53B', carolina:'#4b9cd3', army:'#654321', orange:'#f57c00',
      purple:'#7b1fa2', silver:'#bdbdbd', white:'#9e9e9e', teal:'#00897b'
    };
    if (!teamName) return null;
    return colors[teamName.toLowerCase()] || null;
  }

  function shareCardText() {
    const btn = document.getElementById('cardShareTxtBtn');
    const d = (window._shareCardData || {})[_activeShareKey] || {};

    const lines = [
      `⚾ ${d.awayTeam} @ ${d.homeTeam}`,
      `📅 ${d.gameDateTime || ''}`,
      '',
      `${d.awayTeam}: ${d.awayRecordText || '—'} (${d.awayStandingText || '—'} in standings)`,
      `${d.homeTeam}: ${d.homeRecordText || '—'} (${d.homeStandingText || '—'} in standings)`,
    ];

    if (d.awayTopPlayers?.length || d.homeTopPlayers?.length) {
      lines.push('');
      lines.push('🔑 Key Players');
      if (d.awayTopPlayers?.length) lines.push(`${d.awayTeam}: ${d.awayTopPlayers.join(', ')}`);
      if (d.homeTopPlayers?.length) lines.push(`${d.homeTeam}: ${d.homeTopPlayers.join(', ')}`);
    }

    lines.push('');
    lines.push('acessoftballreference.com');

    navigator.clipboard.writeText(lines.join('\n')).then(() => {
      btn.classList.add('success');
      btn.innerHTML = `<span class="share-card-opt-icon">✅</span><span><div class="share-card-opt-title">Copied!</div><div class="share-card-opt-desc">Paste it anywhere</div></span>`;
      setTimeout(closeCardShareModal, 2000);
    }).catch(() => {
      alert('Could not copy to clipboard.');
    });
  }

  // ── Share Tonight's Games ─────────────────────────────────────────────────
  async function shareTonightGames() {
    const btn = document.querySelector('.share-tonight-btn');
    if (!btn) return;
    const origLabel = btn.innerHTML;
    btn.disabled = true;
    btn.innerHTML = '⏳ Generating…';

    try {
      // Load html2canvas if needed
      if (!window.html2canvas) {
        await new Promise((resolve, reject) => {
          const s = document.createElement('script');
          s.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
          s.onload = resolve; s.onerror = reject;
          document.head.appendChild(s);
        });
      }

      // Get today's date string (YYYY-MM-DD) for comparison
      const todayStr = new Date().toISOString().slice(0, 10);

      // Gather tonight's games from _shareCardData
      const allCards = Object.values(window._shareCardData || {});
      const tonightCards = allCards.filter(d => {
        if (!d.rawDate) return false;
        // rawDate may be "2026-05-04" or "May 4, 2026" — normalize via Date parse
        const parsed = new Date(d.rawDate);
        if (isNaN(parsed)) return false;
        return parsed.toISOString().slice(0, 10) === todayStr;
      });

      if (!tonightCards.length) {
        btn.innerHTML = origLabel;
        btn.disabled = false;
        alert('No games found for tonight.');
        return;
      }

      // Group double-headers: two games with the same pair of teams
      // Canonical matchup key: sorted team names joined with '_'
      const matchupMap = new Map();
      tonightCards.forEach(d => {
        const key = [d.awayTeam, d.homeTeam].map(t => t.toLowerCase()).sort().join('_');
        if (!matchupMap.has(key)) {
          matchupMap.set(key, { games: [], key });
        }
        matchupMap.get(key).games.push(d);
      });

      // Build the date label
      const tonightLabel = new Date().toLocaleDateString('en-US', {
        weekday: 'long', month: 'long', day: 'numeric'
      });

      // Build off-screen wrapper
      const wrapper = document.createElement('div');
      wrapper.style.cssText = `
        position:fixed; top:-9999px; left:-9999px;
        width:460px; background:#ffffff;
        border-radius:16px; overflow:hidden;
        font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
        box-shadow:0 4px 24px rgba(0,0,0,0.12);
      `;

      // Header
      let html = `
        <div style="background:linear-gradient(135deg,#2d5016 0%,#1a6b4a 100%);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;">
          <div style="color:#fff;font-weight:800;font-size:1rem;">⚾ Tonight's Games</div>
          <div style="color:rgba(255,255,255,0.8);font-size:0.75rem;font-weight:600;">acessoftballreference.com</div>
        </div>
        <div style="padding:6px 20px 4px;background:#f0fdf4;border-bottom:1px solid #d1fae5;">
          <div style="font-size:0.78rem;font-weight:700;color:#2d5016;text-transform:uppercase;letter-spacing:0.5px;">${tonightLabel}</div>
        </div>
        <div style="padding:16px 20px;display:flex;flex-direction:column;gap:14px;">
      `;

      // One block per matchup group
      matchupMap.forEach(({ games }) => {
        // Use first game for team/player/record info (same teams regardless of home/away flip)
        const d = games[0];
        const awayColor = getTeamHex(d.awayTeam);
        const homeColor = getTeamHex(d.homeTeam);

        // Collect game times
        const times = games
          .map(g => g.gameTime || (g.gameDateTime || '').split(' ').slice(-2).join(' '))
          .filter(Boolean)
          .join(' & ');

        // Merge key players by TEAM NAME, not by home/away position
        // (double-headers flip home/away, so flatMapping position gives wrong results)
        const teamPlayerMap = new Map();
        games.forEach(g => {
          if (!teamPlayerMap.has(g.awayTeam)) teamPlayerMap.set(g.awayTeam, new Set());
          if (!teamPlayerMap.has(g.homeTeam)) teamPlayerMap.set(g.homeTeam, new Set());
          (g.awayTopPlayers || []).forEach(p => teamPlayerMap.get(g.awayTeam).add(p));
          (g.homeTopPlayers || []).forEach(p => teamPlayerMap.get(g.homeTeam).add(p));
        });

        // Use first game's away/home for display order
        const awayTeam = d.awayTeam;
        const homeTeam = d.homeTeam;
        const awayPlayers = [...(teamPlayerMap.get(awayTeam) || [])];
        const homePlayers = [...(teamPlayerMap.get(homeTeam) || [])];

        html += `
          <div style="background:#f8fafc;border-radius:12px;padding:14px 16px;border:1px solid #e2e8f0;">
            <div style="font-size:0.72rem;color:#718096;font-weight:600;margin-bottom:10px;text-align:center;text-transform:uppercase;letter-spacing:0.4px;">
              ${times ? times + ' · ' : ''}${d.gameType || 'Regular'} Season${games.length > 1 ? ' · Doubleheader' : ''}
            </div>
            <div style="display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:12px;">
              <div style="text-align:center;flex:1;">
                <div style="width:44px;height:44px;border-radius:50%;margin:0 auto 6px;background:${awayColor || '#e2e8f0'};display:flex;align-items:center;justify-content:center;overflow:hidden;">
                  <img src="${d.awayLogoPath || ''}" style="width:38px;height:38px;object-fit:contain;" onerror="this.style.display='none';">
                </div>
                <div style="font-weight:800;font-size:0.95rem;color:#2d3748;">${awayTeam}</div>
                <div style="font-size:0.75rem;color:#718096;">${d.awayRecordText || ''}</div>
              </div>
              <div style="font-size:1.2rem;font-weight:900;color:#2d5016;flex-shrink:0;">@</div>
              <div style="text-align:center;flex:1;">
                <div style="width:44px;height:44px;border-radius:50%;margin:0 auto 6px;background:${homeColor || '#e2e8f0'};display:flex;align-items:center;justify-content:center;overflow:hidden;">
                  <img src="${d.homeLogoPath || ''}" style="width:38px;height:38px;object-fit:contain;" onerror="this.style.display='none';">
                </div>
                <div style="font-weight:800;font-size:0.95rem;color:#2d3748;">${homeTeam}</div>
                <div style="font-size:0.75rem;color:#718096;">${d.homeRecordText || ''}</div>
              </div>
            </div>
            ${(awayPlayers.length || homePlayers.length) ? `
            <div style="display:flex;gap:10px;padding-top:10px;border-top:1px solid #e2e8f0;">
              <div style="flex:1;text-align:center;">
                <div style="font-size:0.68rem;font-weight:700;color:#2d5016;text-transform:uppercase;letter-spacing:0.4px;margin-bottom:4px;">${awayTeam}</div>
                ${awayPlayers.map(p => `<div style="font-size:0.78rem;color:#2d3748;padding:1px 0;">${p}</div>`).join('')}
              </div>
              <div style="flex:1;text-align:center;">
                <div style="font-size:0.68rem;font-weight:700;color:#2d5016;text-transform:uppercase;letter-spacing:0.4px;margin-bottom:4px;">${homeTeam}</div>
                ${homePlayers.map(p => `<div style="font-size:0.78rem;color:#2d3748;padding:1px 0;">${p}</div>`).join('')}
              </div>
            </div>` : ''}
          </div>
        `;
      });

      html += `
          <div style="font-size:0.68rem;color:#a0aec0;text-align:right;padding-top:2px;">Generated ${new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}</div>
        </div>
      `;

      wrapper.innerHTML = html;
      document.body.appendChild(wrapper);
      const canvas = await html2canvas(wrapper, { scale:2, backgroundColor:'#ffffff', useCORS:true, logging:false });
      document.body.removeChild(wrapper);

      const link = document.createElement('a');
      const dateSlug = new Date().toISOString().slice(0,10);
      link.download = `aces-tonight-${dateSlug}.png`;
      link.href = canvas.toDataURL('image/png');
      link.click();

      btn.innerHTML = '✅ Saved!';
      setTimeout(() => { btn.innerHTML = origLabel; btn.disabled = false; }, 2500);

    } catch(err) {
      console.error('shareTonightGames error:', err);
      btn.innerHTML = origLabel;
      btn.disabled = false;
    }
  }
</script>
</body>
</html>
